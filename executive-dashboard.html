// TECH WORLD PAGE
// ══════════════════════════════════════════════════
const techF = { priority: 'all', typeActive: null, deptActive: null };

function setTechType(v) {
  techF.typeActive = (v !== null && techF.typeActive === v) ? null : v;
  renderTechPage(window.__techPs);
}
function setTechDept(v) {
  techF.deptActive = (v !== null && techF.deptActive === v) ? null : v;
  renderTechPage(window.__techPs);
}

function renderTechPage(ps) {
  window.__techPs = ps;

  const inWork   = ps.filter(p => p.mainStatus !== 'הסתיימה' && p.mainStatus !== 'מבוטלת');
  const late     = inWork.filter(p => p.health === 'red');
  const atRisk   = inWork.filter(p => p.health === 'yellow');
  const noDeadl  = inWork.filter(p => p.health === 'no-deadline');
  const highPri  = ps.filter(p => {
    const d = (p.devPriority||'').toLowerCase();
    return d.includes('גבוה') || d.includes('high');
  });
  const abTests  = ps.filter(p => (p.type||'').includes('A/B'));
  const totalTasks = ps.reduce((s,p)=>s+p.total,0);

  // ── Analysis: by type ──
  const typeMap = {};
  ps.forEach(p => {
    const t = stripE(p.type||'').trim() || 'אחר';
    if (!typeMap[t]) typeMap[t] = { all:[], late:[], atRisk:[] };
    typeMap[t].all.push(p);
    if (p.health==='red')    typeMap[t].late.push(p);
    if (p.health==='yellow') typeMap[t].atRisk.push(p);
  });
  const maxType = Math.max(...Object.values(typeMap).map(d=>d.all.length), 1);

  // ── Analysis: by requesting dept ──
  const deptMap = {};
  ps.forEach(p => {
    const d = p.department || 'ללא מחלקה';
    if (!deptMap[d]) deptMap[d] = { all:[], late:[], atRisk:[] };
    deptMap[d].all.push(p);
    if (p.health==='red')    deptMap[d].late.push(p);
    if (p.health==='yellow') deptMap[d].atRisk.push(p);
  });
  const maxDept = Math.max(...Object.values(deptMap).map(d=>d.all.length), 1);

  // ── Bar row builder ──
  function barRow(label, data, max, isActive, fn, val) {
    const w     = Math.round(data.all.length / max * 100);
    const lateW = data.all.length ? Math.round(data.late.length / data.all.length * 100) : 0;
    return `<div class="tk-bar-row ${isActive?'tk-active':''}" onclick="${fn}('${val.replace(/'/g,"\\'")}')">
      <span class="tk-bar-label" title="${label}">${label}</span>
      <div class="tk-bar-track">
        <div class="tk-bar-fill" style="width:${w}%">
          ${lateW ? `<div class="tk-bar-fill-late" style="width:${lateW}%"></div>` : ''}
          <span class="tk-bar-count">${data.all.length}</span>
        </div>
      </div>
      <div class="tk-bar-stats">
        ${data.late.length  ? `<span class="tk-stat red">${data.late.length}</span>`   : ''}
        ${data.atRisk.length? `<span class="tk-stat yellow">${data.atRisk.length}</span>` : ''}
        <span class="tk-stat total">${data.all.length}</span>
      </div>
    </div>`;
  }

  // ── Filter table ──
  let filtered = ps;
  if (techF.typeActive) filtered = filtered.filter(p => (stripE(p.type||'').trim()||'אחר') === techF.typeActive);
  if (techF.deptActive) filtered = filtered.filter(p => (p.department||'ללא מחלקה') === techF.deptActive);
  if (techF.priority !== 'all') {
    const kw = { high:['גבוה','high'], medium:['בינוני','medium','ממוצע'], low:['נמוך','low'] }[techF.priority] || [];
    filtered = filtered.filter(p => kw.some(k=>(p.devPriority||'').toLowerCase().includes(k)));
  }

  // Sort: late first, then by-risk, then by total tasks
  const hOrd = {red:0,'no-deadline':1,yellow:2,green:3,done:4,cancel:5,dept:6};
  filtered = filtered.slice().sort((a,b)=>{
    const ha=hOrd[a.health]??9, hb=hOrd[b.health]??9;
    return ha!==hb ? ha-hb : b.total-a.total;
  });

  // ── Priority helpers ──
  const priKey = (d) => {
    if (!d) return null;
    const dl = d.toLowerCase();
    if (dl.includes('גבוה')||dl.includes('high'))     return 'high';
    if (dl.includes('בינוני')||dl.includes('medium')) return 'medium';
    if (dl.includes('נמוך')||dl.includes('low'))      return 'low';
    return null;
  };

  // ── Duration ──
  const fmtDur = (p) => {
    if (p.tlStart && p.tlEnd) {
      const d = Math.round((p.tlEnd-p.tlStart)/864e5);
      return d < 7 ? `${d}י׳` : `${Math.round(d/7)}ש׳`;
    }
    return '—';
  };

  // ── Table rows ──
  const tableRows = filtered.slice(0,100).map(p => {
    const pk   = priKey(p.devPriority);
    const priHtml = pk
      ? `<span class="tk-pri ${pk}">${p.devPriority}</span>`
      : '<span class="muted">—</span>';
    const days = p.deadline ? Math.round((p.deadline.getTime()-new Date().setHours(0,0,0,0))/864e5) : null;
    const dlColor = days!==null && days<0 ? 'color:var(--red-fg);font-weight:600'
                  : days!==null && days<=7 ? 'color:var(--yellow-fg)' : '';
    const dlRel  = days!==null && days<0  ? `<span class="dl-rel" style="color:var(--red-fg)">(${Math.abs(days)}י׳)</span>`
                 : days!==null && days===0 ? `<span class="dl-rel" style="color:var(--orange-fg)">(היום)</span>` : '';
    const lateAttr = p.health==='red' ? 'data-late' : p.health==='yellow' ? 'data-risk' : '';
    const frStyle  = p.avgFR>2?'color:var(--red-fg);font-weight:700':p.avgFR>1?'color:var(--yellow-fg)':'opacity:.4';
    return `<tr ${lateAttr}>
      <td class="dn" title="${(p.name||'').replace(/"/g,'')}">${stripE(p.name)||p.name}</td>
      <td>${typeChipHtml(p.type)}</td>
      <td style="font-size:12px;color:rgba(26,29,35,.65)">${p.department||'<span class="muted">—</span>'}</td>
      <td style="font-size:12px;color:rgba(26,29,35,.65)">${p.owner||'<span class="muted">—</span>'}</td>
      <td>${priHtml}</td>
      <td>${statusHtml(p.mainStatus)}</td>
      <td><span class="mono ltr" style="${dlColor}">${fmtDate(p.deadline)}</span>${dlRel}</td>
      <td class="mono muted">${fmtDur(p)}</td>
      <td>${healthHtml(p.health)}</td>
      <td class="mono" style="${frStyle}">${p.avgFR||'—'}</td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = `
  <div class="page">
    <div class="page-head">
      <div>
        <h1 class="page-title">פיתוחים טכנולוגיים</h1>
        <div class="page-sub">${ps.length} פרויקטים · ${totalTasks.toLocaleString('he-IL')} משימות · Website Dev · מנויים · A/B Tests</div>
      </div>
    </div>

    <!-- KPI 4-strip -->
    <div class="kpi-strip">
      <div class="kpi">
        <div class="kpi-label">פרויקטים פעילים</div>
        <div class="kpi-value">${inWork.length}</div>
        <div class="kpi-sub">מתוך ${ps.length} סה״כ</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">⚡ High Priority</div>
        <div class="kpi-value warning">${highPri.length}</div>
        <div class="kpi-sub">דורשים טיפול מהיר</div>
      </div>
      <div class="kpi" data-dashed>
        <div class="kpi-label">⚠ באיחור</div>
        <div class="kpi-value danger">${late.length}</div>
        <div class="kpi-sub">${atRisk.length} בסיכון · ${noDeadl.length} ללא ד"ל</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">A/B Tests</div>
        <div class="kpi-value">${abTests.length}</div>
        <div class="kpi-sub">ניסויים פעילים</div>
      </div>
    </div>

    <!-- Analysis row -->
    <div class="tk-analysis">
      <div class="ms-card">
        <div class="ms-card-head">
          <div>
            <div class="ms-card-title">לפי סוג פיתוח</div>
            <div class="ms-card-sub">לחץ שורה לסינון · אדום = באיחור</div>
          </div>
          ${techF.typeActive ? `<button class="card-action" onclick="setTechType(null)">נקה ×</button>` : ''}
        </div>
        <div class="ms-card-body" style="padding:10px 16px">
          ${Object.entries(typeMap).sort((a,b)=>b[1].all.length-a[1].all.length)
            .map(([t,d]) => barRow(t, d, maxType, techF.typeActive===t, 'setTechType', t)).join('')}
        </div>
      </div>
      <div class="ms-card">
        <div class="ms-card-head">
          <div>
            <div class="ms-card-title">מי מבקש פיתוחים</div>
            <div class="ms-card-sub">מחלקה מבקשת · לחץ לסינון</div>
          </div>
          ${techF.deptActive ? `<button class="card-action" onclick="setTechDept(null)">נקה ×</button>` : ''}
        </div>
        <div class="ms-card-body" style="padding:10px 16px">
          ${Object.keys(deptMap).length
            ? Object.entries(deptMap).sort((a,b)=>b[1].all.length-a[1].all.length)
                .map(([d,data]) => barRow(d, data, maxDept, techF.deptActive===d, 'setTechDept', d)).join('')
            : '<div class="empty" style="min-height:80px"><div class="empty-icon" style="font-size:20px">—</div><div style="font-size:12px">אין נתוני מחלקות</div></div>'
          }
        </div>
      </div>
    </div>

    <!-- Priority chips + count -->
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div class="filter-chips">
        <span class="filter-chips-label">פילטר:</span>
        ${[['all','כל הפרויקטים'],['high','High Priority'],['medium','Medium'],['low','Low']].map(([v,l]) =>
          `<button class="filter-chip ${techF.priority===v?'active':''}"
            onclick="techF.priority='${v}';renderTechPage(window.__techPs)">${l}</button>`
        ).join('')}
      </div>
      <span style="font-size:12px;color:rgba(26,29,35,.45)">${filtered.length} מתוך ${ps.length} פרויקטים</span>
    </div>

    <!-- Main table -->
    <div class="ms-card">
      <div class="ms-card-head">
        <div>
          <div class="ms-card-title">פרויקטים — פיתוח טכנולוגי</div>
          <div class="ms-card-sub">ממוין: בריאות ← כמות משימות · פס אדום = באיחור · צהוב = בסיכון</div>
        </div>
      </div>
      ${filtered.length === 0
        ? `<div class="ms-card-body"><div class="empty"><div class="empty-icon">🔍</div><div>לא נמצאו פרויקטים</div></div></div>`
        : `<div class="dtw-wrap">
            <table class="dtw">
              <thead><tr>
                <th>שם הפרויקט</th><th>סוג פיתוח</th><th>מחלקה מבקשת</th><th>אחראי</th>
                <th>פריוריטי</th><th>סטטוס</th><th>דד-ליין</th><th>משך</th><th>בריאות</th><th>Fix Rounds</th>
              </tr></thead>
              <tbody>${tableRows}</tbody>
            </table>
            <div class="tfoot">
              ${filtered.length > 100 ? `מציג 100 ראשונים מתוך ${filtered.length}` : `${filtered.length} פרויקטים · ${totalTasks.toLocaleString('he-IL')} משימות סה״כ`}
            </div>
          </div>`
      }
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════
// OVERVIEW PAGE
// ══════════════════════════════════════════════════
function renderOverview(ps) {
  const now = Date.now();
  const active  = ps.filter(p => p.mainStatus === 'בעבודה');
  const inWork  = ps.filter(p => p.mainStatus !== 'הסתיימה' && p.mainStatus !== 'מבוטלת');
  const red     = inWork.filter(p => p.health === 'red' || p.health === 'no-deadline');
  const yellow  = inWork.filter(p => p.health === 'yellow' || p.health === 'orange');
  const green   = inWork.filter(p => p.health === 'green');
  const pct = n => inWork.length ? Math.round(n/inWork.length*100) : 0;

  // Total tasks
  const totalTasks = ps.reduce((s,p) => s+p.total, 0);
  const doneTasks  = ps.reduce((s,p) => s+p.done+p.cancelled, 0);
  const taskPct    = totalTasks ? Math.round(doneTasks/totalTasks*100) : 0;
  const effortA    = ps.reduce((s,p) => s+p.effortA, 0);
  const effortP    = ps.reduce((s,p) => s+p.effortP, 0);

  // Pipeline by status
  const pipeline = PIPELINE_ORDER.map(status => ({
    label: status,
    count: ps.filter(p => p.mainStatus === status).length,
    tasks: ps.filter(p => p.mainStatus === status).reduce((s,p) => s+p.total, 0),
    key:   STATUS_KEYS[status] || 'backlog',
  }));
  const maxPipe = Math.max(...pipeline.map(p => p.count), 1);

  // Due this week
  const weekEnd = now + 7*864e5;
  const dueWeek = ps.filter(p => p.deadline && p.deadline.getTime() >= now - 864e5 && p.deadline.getTime() <= weekEnd && p.mainStatus !== 'הסתיימה' && p.mainStatus !== 'מבוטלת')
    .sort((a,b) => a.deadline - b.deadline);

  // Quarter from current date
  const nowDate = new Date(now);
  const qIdx = Math.floor(nowDate.getMonth()/3);
  const qStart = new Date(nowDate.getFullYear(), qIdx*3, 1).getTime();
  const qEnd   = new Date(nowDate.getFullYear(), qIdx*3+3, 1).getTime();
  const activeQ = ps.filter(p => p.deadline && p.deadline.getTime() >= qStart && p.deadline.getTime() < qEnd && p.mainStatus !== 'מבוטלת');

  document.getElementById('content').innerHTML = `
  <div class="page">
    <div class="page-head">
      <div>
        <h1 class="page-title">סקירה כללית</h1>
        <div class="page-sub">עדכון · ${nowDate.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long',year:'numeric'})} · ${ps.length} פרויקטים סה״כ</div>
      </div>
    </div>

    <!-- Hero -->
    <div class="hero-stat">
      <div class="hero-stat-left">
        <div class="hero-val">${activeQ.length}</div>
        <div>
          <div class="hero-label">פרויקטים פעילים ברבעון</div>
          <div class="hero-sub">Q${qIdx+1} ${nowDate.getFullYear()} · עם דד-ליין ברבעון הנוכחי</div>
        </div>
      </div>
      <div class="hero-right">◇ נכון להיום ◇</div>
    </div>

    <!-- KPI 6-strip -->
    <div class="kpi-strip kpi-strip-6">
      <div class="kpi">
        <div class="kpi-label">פרויקטים</div>
        <div class="kpi-value">${ps.length}</div>
        <div class="kpi-sub">${inWork.length} פעילים</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">משימות</div>
        <div class="kpi-value">${totalTasks.toLocaleString('he-IL')}</div>
        <div class="kpi-sub">${taskPct}% הושלמו</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">עומדים בזמן</div>
        <div class="kpi-value success">${pct(green.length)}%</div>
        <div class="kpi-sub">${green.length} מתוך ${inWork.length}</div>
      </div>
      <div class="kpi" data-dashed>
        <div class="kpi-label">באיחור</div>
        <div class="kpi-value danger">${pct(red.length)}%</div>
        <div class="kpi-sub">${red.length} פרויקטים</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">בסיכון</div>
        <div class="kpi-value warning">${pct(yellow.length)}%</div>
        <div class="kpi-sub">${yellow.length} פרויקטים</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">שעות בפועל</div>
        <div class="kpi-value" style="font-size:26px">${fmtN(effortA)}</div>
        <div class="kpi-sub">מתוכנן: ${fmtN(effortP)}ש׳</div>
      </div>
    </div>

    <!-- Pipeline -->
    <div class="ms-card">
      <div class="ms-card-head">
        <div>
          <div class="ms-card-title">מצב הפרויקטים</div>
          <div class="ms-card-sub">לפי שלב בתהליך · ממתין → אישור → בעבודה → סיום</div>
        </div>
      </div>
      <div class="ms-card-body">
        <div class="pipeline">
          ${pipeline.map(p => {
            const w = maxPipe > 0 ? (p.count / maxPipe * 100) : 0;
            const isActive  = p.key === 'active';
            const isCancel  = p.key === 'cancel';
            return `<div class="pcell" ${isActive?'data-active':''} ${isCancel?'data-cancel':''}>
              <div class="pcell-label">${p.label}</div>
              <div class="pcell-num">${p.count}</div>
              <div class="pcell-sub">${p.tasks} משימות</div>
              <div class="pcell-bar"><div class="pcell-bar-fill" style="width:${w}%"></div></div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <!-- Row: Due this week + Needs attention -->
    <div class="row-2-1">
      <div class="ms-card">
        <div class="ms-card-head">
          <div>
            <div class="ms-card-title">דד-ליינים השבוע</div>
            <div class="ms-card-sub">${dueWeek.length} פרויקטים בשבעת הימים הקרובים</div>
          </div>
        </div>
        ${dueWeek.length === 0
          ? `<div class="ms-card-body"><div class="empty"><div class="empty-icon">📅</div><div>אין דד-ליינים השבוע</div></div></div>`
          : `<div class="dtw-wrap">
              <table class="dtw-dl">
                <thead><tr><th>פרויקט</th><th>סוג</th><th>דד-ליין</th><th>עמידה</th></tr></thead>
                <tbody>${dueWeek.slice(0,10).map(p => {
                  const days = Math.round((p.deadline.getTime() - now) / 864e5);
                  const rel  = days < 0 ? `(${Math.abs(days)} י׳ איחור)` : days === 0 ? '(היום!)' : `(בעוד ${days})`;
                  return `<tr>
                    <td class="dn" style="max-width:180px;font-weight:600">${stripE(p.name)||p.name}</td>
                    <td>${typeChipHtml(p.type)}</td>
                    <td><span class="mono ltr">${fmtDate(p.deadline)}</span> <span class="dl-rel">${rel}</span></td>
                    <td>${healthHtml(p.health)}</td>
                  </tr>`;
                }).join('')}</tbody>
              </table>
            </div>`
        }
      </div>

      <div class="ms-card">
        <div class="ms-card-head">
          <div>
            <div class="ms-card-title">דורש תשומת לב</div>
            <div class="ms-card-sub">${red.length} פרויקטים באיחור</div>
          </div>
        </div>
        ${red.length === 0
          ? `<div class="ms-card-body"><div class="empty"><div class="empty-icon">✅</div><div>אין פרויקטים באיחור</div></div></div>`
          : `<div class="att-list">${red.slice(0,7).map(p => {
              const overdue = p.deadline ? Math.max(0, Math.round((Date.now() - p.deadline.getTime()) / 864e5)) : 0;
              return `<div class="att-row">
                <div class="att-main">
                  <div class="att-name">${stripE(p.name)||p.name}</div>
                  <div class="att-meta">
                    <span>${p.type||'—'}</span>
                    <span class="att-dot">·</span>
                    <span>${p.team}</span>
                  </div>
                </div>
                <div class="att-badge">
                  <div class="att-num">${overdue}</div>
                  <span class="att-num-label">ימי איחור</span>
                </div>
              </div>`;
            }).join('')}</div>`
        }
      </div>
    </div>
  </div>`;
}

const ppF = { stage:'all', type:'all', quarter:'all', status:'all', groupBy:'product' };
function setPpFilter(key, val) { ppF[key] = val; renderProductLaunches(productLaunchItems); }

function workingDaysBetween(d1, d2) {
  if (!d1 || !d2) return null;
  const t1 = new Date(d1); t1.setHours(0,0,0,0);
  const t2 = new Date(d2); t2.setHours(0,0,0,0);
  const sign = t1 <= t2 ? 1 : -1;
  const start = sign === 1 ? t1 : t2;
  const end   = sign === 1 ? t2 : t1;
  let days = 0, cur = new Date(start);
  while (cur < end) {
    const dow = cur.getDay(); // 0=Sun … 6=Sat; Israel: skip Fri(5)+Sat(6)
    if (dow !== 5 && dow !== 6) days++;
    cur.setDate(cur.getDate() + 1);
  }
  return sign * days;
}

function renderProductLaunches(items) {
  const todayMs = new Date().setHours(0,0,0,0);

  function plCv(item, colId) {
    const r = item.column_values?.find(r => r.column_id === colId);
    return r ? { t: r.text_value, r: r.value } : { t: null, r: null };
  }

  // Build Hub task index by Board Name (text_mm1rz19m)
  const hubByBoardName = new Map();
  (window.__rawItems || []).forEach(task => {
    const boardName = task.column_values?.find(cv => cv.column_id === C.BOARD_NAME)?.text_value;
    if (!boardName) return;
    if (!hubByBoardName.has(boardName)) hubByBoardName.set(boardName, []);
    hubByBoardName.get(boardName).push(task);
  });

  const ACTIVE_STAGES = new Set(['Planning & Initiation','Product Design','Product Development','Cross-Team Alignment','Product Manufacturing']);
  function deriveStatus(stage) {
    if (ACTIVE_STAGES.has(stage))  return 'בעבודה';
    if (stage === 'Stock Date')    return 'הסתיימה';
    if (stage === 'RED FLAG')      return 'דגל אדום';
    if (stage === 'On Hold')       return 'למעקב';
    return '';
  }

  // Hub data: min/max timeline, working-day span, task status breakdown
  function calcHubData(itemName) {
    const tasks = hubByBoardName.get(itemName) || [];
    let minStart = null, maxEnd = null, total = 0, relevant = 0;
    const breakdown = {};
    tasks.forEach(task => {
      total++;
      const status = task.column_values?.find(cv => cv.column_id === C.STATUS)?.text_value || 'אחר';
      breakdown[status] = (breakdown[status] || 0) + 1;
      const calcFlag = task.column_values?.find(cv => cv.column_id === C.CALC_DEADLINE)?.text_value;
      if (calcFlag === 'לא') return;
      relevant++;
      const tlRaw = task.column_values?.find(cv => cv.column_id === C.TIMELINE)?.value;
      const tl = parseTL(tlRaw);
      if (tl.from && (!minStart || tl.from < minStart)) minStart = tl.from;
      if (tl.to   && (!maxEnd  || tl.to   > maxEnd  )) maxEnd   = tl.to;
    });
    const spanWd = workingDaysBetween(minStart, maxEnd);
    return { minStart, maxEnd, spanWd, breakdown, total, relevant };
  }

  // Pre-pass: canonical launch date per product line (all items in same line share the launch quarter)
  const productLineLaunchMap = new Map();
  items.forEach(item => {
    const pl = plCv(item, PL.PRODUCT_NAME).t || '—';
    const ld = parseDate(plCv(item, PL.LAUNCH_DATE).t);
    if (ld && !productLineLaunchMap.has(pl)) productLineLaunchMap.set(pl, ld);
  });

  function toQuarter(d) {
    if (!d) return '';
    return `Q${Math.floor(d.getMonth()/3)+1} ${d.getFullYear()}`;
  }

  function parsePLItem(item) {
    const launchDate  = parseDate(plCv(item, PL.LAUNCH_DATE).t);
    const stockDate   = parseDate(plCv(item, PL.STOCK_DATE).t);
    const stage       = plCv(item, PL.STAGE).t || '';
    const productLine = plCv(item, PL.PRODUCT_NAME).t || '—';
    const type        = plCv(item, PL.PROJECT_TYPE).t || '';

    const derivedStatus = deriveStatus(stage);
    const isDone    = derivedStatus === 'הסתיימה';
    const isHold    = derivedStatus === 'למעקב';
    const isRedFlag = stage === 'RED FLAG';

    const hubData = (isDone || isHold)
      ? { minStart:null, maxEnd:null, spanWd:null, breakdown:{}, total:0, relevant:0 }
      : calcHubData(item.name);

    const timelineOverrun = hubData.maxEnd && stockDate && hubData.maxEnd.getTime() > stockDate.getTime();
    const stockVsLaunchWd = (stockDate && launchDate) ? workingDaysBetween(stockDate, launchDate) : null;

    // launchQuarter: product-line level — all items in same line share the line's launch date
    const launchQuarter = toQuarter(productLineLaunchMap.get(productLine) || launchDate);
    // stockQuarter: per-item, from its own stock date
    const stockQuarter  = toQuarter(stockDate);

    let health;
    if (isDone)    health = 'done';
    else if (isHold) health = 'hold';
    else if (isRedFlag || timelineOverrun) health = 'red';
    else if (stockDate && stockDate.getTime() <= todayMs + 7*864e5) health = 'yellow';
    else health = 'green';

    function parseLink(raw) {
      try { const v = typeof raw === 'string' ? JSON.parse(raw) : raw; return v?.url ? v : null; }
      catch { return null; }
    }
    const boardLink = parseLink(plCv(item, PL.BOARD_LINK).r);
    const briefLink = parseLink(plCv(item, PL.BRIEF).r);

    return {
      ...item, launchDate, stockDate, stage, productLine, type, launchQuarter, stockQuarter,
      derivedStatus, hubData, timelineOverrun, stockVsLaunchWd,
      isDone, isHold, isRedFlag, health, boardLink, briefLink,
    };
  }

  let parsed = items.map(parsePLItem);

  // Filter option lists (from full unfiltered set)
  const allStages   = [...new Set(items.map(i => plCv(i, PL.STAGE).t).filter(Boolean))].sort();
  const allTypes    = [...new Set(items.map(i => plCv(i, PL.PROJECT_TYPE).t).filter(Boolean))].sort();
  // allQuarters = product-line level launch quarters (deduplicated from the pre-computed map)
  const allLaunchQuarters = [...new Set([...productLineLaunchMap.values()].map(d => toQuarter(d)))].sort();

  // Apply filters
  if (ppF.stage   !== 'all') parsed = parsed.filter(p => p.stage === ppF.stage);
  if (ppF.type    !== 'all') parsed = parsed.filter(p => p.type  === ppF.type);
  if (ppF.quarter !== 'all') parsed = parsed.filter(p => p.launchQuarter === ppF.quarter);
  if (ppF.status  !== 'all') {
    if (ppF.status === 'done')   parsed = parsed.filter(p => p.health === 'done');
    else if (ppF.status === 'active') parsed = parsed.filter(p => p.health === 'green' || p.health === 'yellow');
    else if (ppF.status === 'red')    parsed = parsed.filter(p => p.health === 'red');
    else if (ppF.status === 'yellow') parsed = parsed.filter(p => p.health === 'yellow');
    else if (ppF.status === 'hold')   parsed = parsed.filter(p => p.health === 'hold');
  }

  parsed.sort((a, b) => {
    const da = a.launchDate?.getTime() ?? Infinity;
    const db = b.launchDate?.getTime() ?? Infinity;
    if (da !== db) return da - db;
    const sa = a.stockDate?.getTime() ?? Infinity;
    const sb = b.stockDate?.getTime() ?? Infinity;
    return sa - sb;
  });

  const total     = parsed.length;
  const redFlags  = parsed.filter(p => p.health === 'red').length;
  const atRisk    = parsed.filter(p => p.health === 'yellow').length;
  const doneCount = parsed.filter(p => p.health === 'done').length;
  const holdCount = parsed.filter(p => p.health === 'hold').length;

  const grouped = new Map();
  parsed.forEach(p => {
    let key;
    if      (ppF.groupBy === 'launch_quarter') key = p.launchQuarter || 'ללא רבעון השקה';
    else if (ppF.groupBy === 'stock_quarter')  key = p.stockQuarter  || 'ללא רבעון מחסן';
    else if (ppF.groupBy === 'stage') key = p.stage || 'ללא שלב';
    else if (ppF.groupBy === 'type')  key = p.type  || 'ללא סוג';
    else key = p.productLine;
    if (!grouped.has(key)) grouped.set(key, []);
    grouped.get(key).push(p);
  });
  const isQuarterGroupBy = ppF.groupBy === 'launch_quarter' || ppF.groupBy === 'stock_quarter';
  const sortedGroups = [...grouped.entries()].sort((a, b) => {
    if (isQuarterGroupBy) return a[0] < b[0] ? -1 : 1;
    const aDate = a[1].find(p=>p.launchDate)?.launchDate?.getTime() ?? Infinity;
    const bDate = b[1].find(p=>p.launchDate)?.launchDate?.getTime() ?? Infinity;
    return aDate - bDate;
  });

  const STAGE_COLORS = {
    'Planning & Initiation':  { bg:'#dbeafe', fg:'#1d4ed8' },
    'Product Design':         { bg:'#fce7f3', fg:'#be185d' },
    'Product Development':    { bg:'#dcfce7', fg:'#15803d' },
    'Cross-Team Alignment':   { bg:'#fef3c7', fg:'#b45309' },
    'Product Manufacturing':  { bg:'#ede9fe', fg:'#6d28d9' },
    'Stock Date':             { bg:'#ffedd5', fg:'#c2410c' },
    'RED FLAG':               { bg:'#fee2e2', fg:'#b91c1c' },
    'On Hold':                { bg:'#f1f5f9', fg:'#64748b' },
  };

  const STATUS_COLORS = {
    'הסתיימה':'#15803d','בעבודה':'#1d4ed8','מאושר':'#7c3aed',
    'ממתין':'#b45309','דגל אדום':'#b91c1c','מבוטלת':'#64748b',
    'בנק משימות':'#94a3b8','אחר':'#cbd5e1',
  };

  function stagePill(stage) {
    if (!stage) return '';
    const c = STAGE_COLORS[stage] || { bg:'#f1f5f9', fg:'#475569' };
    return `<span class="pl-stage-pill" style="background:${c.bg};color:${c.fg}">${stage}</span>`;
  }

  function healthDot(p) {
    if (p.health === 'done')   return '<span class="pl-dot done">✓</span>';
    if (p.health === 'hold')   return '<span class="pl-dot hold">⏸</span>';
    if (p.health === 'red')    return '<span class="pl-dot red">🚩</span>';
    if (p.health === 'yellow') return '<span class="pl-dot yellow">⚠</span>';
    return '<span class="pl-dot green">●</span>';
  }

  function stockCell(p) {
    if (!p.stockDate) return '<span style="color:rgba(26,29,35,.3)">—</span>';
    const diff = Math.round((p.stockDate.getTime() - todayMs) / 864e5);
    let chip = '';
    if (p.health === 'done') chip = `<span class="pl-days done">✓ הסתיימה</span>`;
    else if (p.health === 'hold') chip = `<span class="pl-days hold">⏸ בהמתנה</span>`;
    else if (diff < 0) chip = `<span class="pl-days red">באיחור של ${Math.abs(diff)} ימים</span>`;
    else if (diff === 0) chip = `<span class="pl-days yellow">היום!</span>`;
    else if (diff === 1) chip = `<span class="pl-days ${p.health}">מחר</span>`;
    else chip = `<span class="pl-days ${p.health}">${diff} ימים נשארו</span>`;
    return `<div style="display:flex;flex-direction:column;gap:3px"><span class="ltr" style="font-family:'JetBrains Mono',monospace;font-size:12px">${fmtDate(p.stockDate)}</span>${chip}</div>`;
  }

  function spanWdCell(p) {
    if (p.hubData.spanWd === null) return '<span style="color:rgba(26,29,35,.3)">—</span>';
    return `<span class="ppf-wd">${p.hubData.spanWd}<span class="ppf-wd-label"> י״ע</span></span>`;
  }

  function stockVsLaunchCell(p) {
    if (p.stockVsLaunchWd === null) return '<span style="color:rgba(26,29,35,.3)">—</span>';
    // positive = stock is N working days before launch (good)
    if (p.stockVsLaunchWd > 0) return `<span class="ppf-gap positive">${p.stockVsLaunchWd} י״ע לפני</span>`;
    if (p.stockVsLaunchWd < 0) return `<span class="ppf-gap negative">${Math.abs(p.stockVsLaunchWd)} י״ע אחרי</span>`;
    return `<span class="ppf-gap zero">אותו יום</span>`;
  }

  function taskBattery(p) {
    const bd = p.hubData.breakdown;
    const tot = p.hubData.total;
    if (tot === 0) return '<span style="color:rgba(26,29,35,.3)">—</span>';
    const done = bd['הסתיימה'] || 0;
    const pct = Math.round(done / tot * 100);
    const segments = Object.entries(bd).sort((a,b)=>b[1]-a[1]).map(([st, cnt]) => {
      const c = STATUS_COLORS[st] || '#cbd5e1';
      return `<div class="ppf-seg" style="width:${(cnt/tot*100).toFixed(1)}%;background:${c}" title="${st}: ${cnt}"></div>`;
    }).join('');
    const safeName = p.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="ppf-battery-wrap" onclick="showPpfPopup('${safeName}')">
      <div class="ppf-battery">${segments}</div>
      <span class="ppf-battery-pct">${pct}%</span>
      <span class="ppf-battery-count">${tot}</span>
    </div>`;
  }

  function groupHtml(groupLabel, groupItems) {
    // Show only the 3 meaningful milestones per product line
    const sampleItem  = groupItems.find(p => p.type === '📦 Sample');
    const prboxItem   = groupItems.find(p => p.type === '🎁 PR Box');
    // Main product = anything that's not Sample and not PR Box
    const productItem = groupItems.find(p => p.type !== '📦 Sample' && p.type !== '🎁 PR Box');

    const rows = [
      sampleItem  ? { item: sampleItem,  label: 'סמפל',  icon: '🧪' } : null,
      productItem ? { item: productItem, label: 'מוצר',  icon: '📦' } : null,
      prboxItem   ? { item: prboxItem,   label: 'PR Box', icon: '🎁' } : null,
    ].filter(Boolean);

    const allDone = rows.every(r => r.item.health === 'done');
    const hasRed  = rows.some(r => r.item.health === 'red');
    const launchItem    = groupItems.find(p => p.launchDate);
    const boardLinkItem = groupItems.find(p => p.boardLink?.url);
    const briefLinkItem = groupItems.find(p => p.briefLink?.url);

    const linkButtons = [
      boardLinkItem ? `<a href="${boardLinkItem.boardLink.url}" target="_blank" class="ppf-group-link">📋 בורד</a>` : '',
      briefLinkItem ? `<a href="${briefLinkItem.briefLink.url}" target="_blank" class="ppf-group-link ppf-group-link-brief">📄 בריף</a>` : '',
    ].filter(Boolean).join('');

    function itemRowHtml({ item: p, label, icon }) {
      const diff = p.stockDate ? Math.round((p.stockDate.getTime() - todayMs) / 864e5) : null;
      let chip = '';
      if (!p.stockDate) chip = '<span style="color:rgba(26,29,35,.3)">—</span>';
      else if (p.health === 'done') chip = `<span class="pl-days done">✓ הסתיימה</span>`;
      else if (p.health === 'hold') chip = `<span class="pl-days hold">⏸ בהמתנה</span>`;
      else if (diff < 0) chip = `<span class="pl-days red">באיחור של ${Math.abs(diff)} ימים</span>`;
      else if (diff === 0) chip = `<span class="pl-days yellow">היום!</span>`;
      else if (diff === 1) chip = `<span class="pl-days ${p.health}">מחר</span>`;
      else chip = `<span class="pl-days ${p.health}">${diff} ימים נשארו</span>`;

      const sc = STAGE_COLORS[p.stage] || { bg:'#f1f5f9', fg:'#475569' };
      const rowCls = p.health === 'red' ? 'pl-row-red' : p.health === 'yellow' ? 'pl-row-yellow' : p.health === 'done' ? 'pl-row-done' : p.health === 'hold' ? 'pl-row-hold' : '';

      return `<tr class="pl-row ${rowCls}">
        <td class="pl-td ppf-type-cell"><span class="ppf-type-label">${icon} ${label}</span></td>
        <td class="pl-td"><span class="pl-stage-pill" style="background:${sc.bg};color:${sc.fg}">${p.stage || '—'}</span></td>
        <td class="pl-td" style="width:100%">
          <div class="ppf-date-row">
            <span class="ltr" style="font-family:'JetBrains Mono',monospace;font-size:12px;flex-shrink:0">${fmtDate(p.stockDate)}</span>
            <span class="ppf-dot-line"></span>
            ${chip}
          </div>
        </td>
        <td class="pl-td">${taskBattery(p)}</td>
      </tr>`;
    }

    return `<div class="pl-group ${allDone ? 'pl-group-done' : ''}">
      <div class="pl-group-head">
        <div class="pl-group-title">
          ${hasRed ? '<span class="pl-group-flag">🚩</span>' : allDone ? '<span style="color:var(--green-fg)">✓</span>' : ''}
          <span>${groupLabel}</span>
          ${linkButtons}
        </div>
        ${launchItem ? `<div class="ppf-launch-badge">🏁 &nbsp;השקה &nbsp;<strong class="ltr">${fmtDate(launchItem.launchDate)}</strong></div>` : ''}
      </div>
      <table class="pl-table">
        <tbody>${rows.map(itemRowHtml).join('')}</tbody>
      </table>
    </div>`;
  }

  const notDeployedBanner = items.length === 0 ? `
    <div class="pl-notice">
      <div class="pl-notice-icon">⚙️</div>
      <div>
        <div class="pl-notice-title">עדיין לא מחובר לנתונים חיים</div>
        <div class="pl-notice-sub">להפעיל: <code>npx supabase functions deploy product-launches-fetch --project-ref syrhxhytlkcnakicnyde</code></div>
      </div>
    </div>` : '';

  document.getElementById('content').innerHTML = `
  <div class="page">
    <div id="ppf-overlay" class="ppf-overlay" onclick="if(event.target===this)this.style.display='none'">
      <div class="ppf-modal">
        <div class="ppf-modal-head">
          <span id="ppf-modal-title"></span>
          <button class="ppf-close" onclick="document.getElementById('ppf-overlay').style.display='none'">✕</button>
        </div>
        <div id="ppf-modal-body"></div>
      </div>
    </div>

    <div class="page-head">
      <div>
        <h1 class="page-title">📦 פורטפוליו מוצר</h1>
        <div class="page-sub">סטטוס פיתוח מוצרים · דד-ליין = תאריך מחסן · 🚩 חריגה = ציר משימות חורג מתאריך המחסן</div>
      </div>
      <div class="ppf-team-header">
        <span class="ppf-team-role">מנהלת מוצר:</span><span class="ppf-team-name">קים ריכטר</span>
        <span class="ppf-team-sep">·</span>
        <span class="ppf-team-role">סמנכ״ל מוצר:</span><span class="ppf-team-name">יונתן קרן</span>
      </div>
    </div>

    ${notDeployedBanner}

    <div class="kpi-strip" style="grid-template-columns:repeat(5,1fr)">
      <div class="kpi">
        <div class="kpi-label">סה״כ פריטים</div>
        <div class="kpi-value">${total}</div>
        <div class="kpi-sub">${sortedGroups.length} קבוצות</div>
      </div>
      <div class="kpi" style="${redFlags?'border-color:var(--red-fg)':''}">
        <div class="kpi-label">🚩 דגלים אדומים</div>
        <div class="kpi-value ${redFlags?'danger':''}">${redFlags}</div>
        <div class="kpi-sub">RED FLAG / איחור</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">⚠ בסיכון</div>
        <div class="kpi-value ${atRisk?'warning':''}">${atRisk}</div>
        <div class="kpi-sub">תוך 7 ימים</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">⏸ בהמתנה</div>
        <div class="kpi-value">${holdCount}</div>
        <div class="kpi-sub">On Hold</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">✅ הושלמו</div>
        <div class="kpi-value success">${doneCount}</div>
        <div class="kpi-sub">מתוך ${items.length}</div>
      </div>
    </div>

    <div class="pf-bar">
      <span class="pf-label">שלב:</span>
      <select class="pf-select" onchange="setPpFilter('stage', this.value)">
        <option value="all" ${ppF.stage==='all'?'selected':''}>הכל</option>
        ${allStages.map(s => `<option value="${s}" ${ppF.stage===s?'selected':''}>${s}</option>`).join('')}
      </select>
      <span class="pf-label">סוג:</span>
      <select class="pf-select" onchange="setPpFilter('type', this.value)">
        <option value="all" ${ppF.type==='all'?'selected':''}>הכל</option>
        ${allTypes.map(t => `<option value="${t}" ${ppF.type===t?'selected':''}>${t}</option>`).join('')}
      </select>
      <span class="pf-label">רבעון (השקה):</span>
      <select class="pf-select" onchange="setPpFilter('quarter', this.value)">
        <option value="all" ${ppF.quarter==='all'?'selected':''}>הכל</option>
        ${allLaunchQuarters.map(q => `<option value="${q}" ${ppF.quarter===q?'selected':''}>${q}</option>`).join('')}
      </select>
      <span class="pf-label">סטטוס:</span>
      <select class="pf-select" onchange="setPpFilter('status', this.value)">
        <option value="all"    ${ppF.status==='all'   ?'selected':''}>הכל</option>
        <option value="active" ${ppF.status==='active'?'selected':''}>בעבודה</option>
        <option value="red"    ${ppF.status==='red'   ?'selected':''}>🚩 דגל אדום</option>
        <option value="yellow" ${ppF.status==='yellow'?'selected':''}>⚠ בסיכון</option>
        <option value="hold"   ${ppF.status==='hold'  ?'selected':''}>⏸ On Hold</option>
        <option value="done"   ${ppF.status==='done'  ?'selected':''}>✅ הושלמו</option>
      </select>
      <div class="pf-div"></div>
      <span class="pf-label">קיבוץ לפי:</span>
      <select class="pf-select" onchange="setPpFilter('groupBy', this.value)">
        <option value="product"        ${ppF.groupBy==='product'       ?'selected':''}>קו מוצר</option>
        <option value="launch_quarter" ${ppF.groupBy==='launch_quarter'?'selected':''}>רבעון (השקה)</option>
        <option value="stock_quarter"  ${ppF.groupBy==='stock_quarter' ?'selected':''}>רבעון (מחסן)</option>
        <option value="stage"          ${ppF.groupBy==='stage'         ?'selected':''}>שלב</option>
        <option value="type"           ${ppF.groupBy==='type'          ?'selected':''}>סוג מוצר</option>
      </select>
      <span style="margin-right:auto;font-size:11px;color:rgba(26,29,35,.42)">${parsed.length} פריטים</span>
    </div>

    <div class="pl-groups">
      ${sortedGroups.length === 0
        ? `<div class="ms-card"><div class="ms-card-body"><div class="empty"><div class="empty-icon">📦</div><div>לא נמצאו פריטים</div></div></div></div>`
        : sortedGroups.map(([label, grpItems]) => groupHtml(label, grpItems)).join('')
      }
    </div>
  </div>`;

  window.__ppfParsed = parsed;
}

function showPpfPopup(itemName) {
  const p = (window.__ppfParsed || []).find(x => x.name === itemName);
  const overlay = document.getElementById('ppf-overlay');
  if (!overlay || !p) return;

    'הסתיימה':'#15803d','בעבודה':'#1d4ed8','מאושר':'#7c3aed',
    'ממתין':'#b45309','דגל אדום':'#b91c1c','מבוטלת':'#64748b',
    'בנק משימות':'#94a3b8','אחר':'#cbd5e1',

  const bd = p.hubData.breakdown;
  const bdRows = Object.entries(bd).sort((a,b)=>b[1]-a[1]).map(([st,cnt]) =>

      <span class="ppf-popup-status">${st}</span>

      <div><span class="ppf-popup-label">שלב:</span> ${p.stage || '—'}</div>
      <div><span class="ppf-popup-label">סטטוס:</span> ${p.derivedStatus || '—'}</div>
      <div><span class="ppf-popup-label">תאריך מחסן:</span> <span class="ltr">${fmtDate(p.stockDate)}</span></div>
      <div><span class="ppf-popup-label">תאריך השקה:</span> <span class="ltr">${fmtDate(p.launchDate)}</span></div>
      ${p.hubData.minStart ? `<div><span class="ppf-popup-label">פתיחת ציר:</span> <span class="ltr">${fmtDate(p.hubData.minStart)}</span></div>` : ''}
      ${p.hubData.maxEnd   ? `<div><span class="ppf-popup-label">סגירת ציר:</span> <span class="ltr">${fmtDate(p.hubData.maxEnd)}</span></div>` : ''}
      ${p.hubData.spanWd !== null ? `<div><span class="ppf-popup-label">ספן ימי עבודה:</span> ${p.hubData.spanWd} י״ע</div>` : ''}
      ${p.stockVsLaunchWd !== null ? `<div><span class="ppf-popup-label">מחסן → השקה:</span> ${p.stockVsLaunchWd > 0 ? p.stockVsLaunchWd+' י״ע לפני' : Math.abs(p.stockVsLaunchWd)+' י״ע אחרי'}</div>` : ''}
    </div>
    <div class="ppf-popup-breakdown">
      <div class="ppf-popup-breakdown-title">פירוט סטטוסים (${p.hubData.total} משימות)</div>
      ${bdRows || '<div style="color:rgba(26,29,35,.4);font-size:13px">אין משימות מקושרות</div>'}
    </div>`;
  overlay.style.display = 'flex';
}

// ══════════════════════════════════════════════════
// PRODUCT ROADMAP — Timeline of launches + milestones
// ══════════════════════════════════════════════════
const prmF = {
  scale: 'months',
  status: 'all',
  category: 'all',
  show: { launch:true, sample:true, stock:true, prBox:true },
  search: '',
};
function setPrmScale(v)    { prmF.scale = v;    renderProductRoadmap(); }
function setPrmStatus(v)   { prmF.status = v;   renderProductRoadmap(); }
function setPrmCategory(v) { prmF.category = v; renderProductRoadmap(); }
function setPrmShow(k)     { prmF.show[k] = !prmF.show[k]; renderProductRoadmap(); }
function setPrmSearch(v)   { prmF.search = v;   renderProductRoadmap(); }

const PRM_MTYPES = {
  launch: { he:'השקה',  icon:'🚩', color:'var(--accent)'     },
  sample: { he:'סמפל',  icon:'🧪', color:'var(--yellow-fg)'  },
  stock:  { he:'מלאי',  icon:'📦', color:'var(--blue-fg)'    },
  prBox:  { he:'PR Box',icon:'🎁', color:'var(--orange-fg)'  },
};

const PRM_STATUSES = [
  { key:'all',    he:'הכל',     test:()=>true,                                  dot:'#1a1d23' },
  { key:'green',  he:'בזמן',    test:p=>p.health==='green',                     dot:'#15803D' },
  { key:'yellow', he:'בסיכון',  test:p=>p.health==='yellow',                    dot:'#B45309' },
  { key:'red',    he:'באיחור',  test:p=>p.health==='red',                       dot:'#B91C1C' },
  { key:'hold',   he:'מוקפא',   test:p=>p.health==='hold',                      dot:'#475569' },
  { key:'done',   he:'הושק',    test:p=>p.health==='done',                      dot:'#1D4ED8' },
];

function prmClassifyHubTask(task) {
  const name = (task.name || '').toLowerCase();
  if (name.includes('השקה') || name.includes('launch') || name.includes('go live')) return 'launch';
  if (name.includes('pr box') || name.includes('פר בוקס') || name.includes('פר-בוקס')) return 'prBox';
  if (name.includes('סמפל') || name.includes('sample') || name.includes('דגימה')) return 'sample';
  if (name.includes('מלאי') || name.includes('מחסן') || name.includes('stock') || name.includes('warehouse') || name.includes('inventory')) return 'stock';
  return null;
}

function prmTaskEndDate(task) {
  const tlRaw = task.column_values?.find(cv => cv.column_id === C.TIMELINE)?.value;
  const tl = parseTL(tlRaw);
  if (tl.to) return tl.to;
  const dl = task.column_values?.find(cv => cv.column_id === C.DEADLINE)?.text_value;
  return parseDate(dl);
}

function prmExtractCategory(name) {
  const n = (name || '').replace(/^✨\s*/, '').trim();
  const lower = n.toLowerCase();
  if (lower.startsWith('gummies'))     return 'Gummies';
  if (lower.startsWith('edible'))      return 'Edibles';
  if (lower.startsWith('pr box') || lower.startsWith('pr  box') || lower.startsWith('pr-box')) return 'PR Box';
  if (lower.startsWith('sample'))      return 'Samples';
  if (lower.startsWith('accessories')) return 'Accessories';
  return 'אחר';
}

function prmTypeToMtype(plType) {
  if (!plType) return null;
  if (plType.includes('Sample')) return 'sample';
  if (plType.includes('PR Box')) return 'prBox';
  if (plType.includes('Accessories')) return 'stock';
  if (plType.includes('New Product')) return 'stock';
  return null;
}

function renderProductRoadmap() {
  const items = productLaunchItems || [];
  const todayMs = new Date().setHours(0,0,0,0);
  const today   = new Date(todayMs);

  function plCv(item, colId) {
    const r = item.column_values?.find(r => r.column_id === colId);
    return r ? { t: r.text_value, r: r.value } : { t: null, r: null };
  }

  const hubByBoardName = new Map();
  (window.__rawItems || []).forEach(task => {
    const boardName = task.column_values?.find(cv => cv.column_id === C.BOARD_NAME)?.text_value;
    if (!boardName) return;
    if (!hubByBoardName.has(boardName)) hubByBoardName.set(boardName, []);
    hubByBoardName.get(boardName).push(task);
  });

  const subItemsByLine = new Map();
  items.forEach(item => {
    const line = plCv(item, PL.PRODUCT_NAME).t || '';
    const launch = parseDate(plCv(item, PL.LAUNCH_DATE).t);
    if (launch) return;
    const stock = parseDate(plCv(item, PL.STOCK_DATE).t);
    if (!stock || !line) return;
    const type = plCv(item, PL.PROJECT_TYPE).t || '';
    const mtype = prmTypeToMtype(type);
    if (!mtype) return;
    if (!subItemsByLine.has(line)) subItemsByLine.set(line, []);
    subItemsByLine.get(line).push({ name: item.name, date: stock, mtype, type });
  });

  const ACTIVE_STAGES = new Set(['Planning & Initiation','Product Design','Product Development','Cross-Team Alignment','Product Manufacturing']);
  function deriveStatus(stage) {
    if (ACTIVE_STAGES.has(stage))  return 'בעבודה';
    if (stage === 'Stock Date')    return 'הסתיימה';
    if (stage === 'RED FLAG')      return 'דגל אדום';
    if (stage === 'On Hold')       return 'למעקב';
    return '';
  }

  function parseProduct(item) {
    const launchDate  = parseDate(plCv(item, PL.LAUNCH_DATE).t);
    const stockDate   = parseDate(plCv(item, PL.STOCK_DATE).t);
    const stage       = plCv(item, PL.STAGE).t || '';
    const productLine = plCv(item, PL.PRODUCT_NAME).t || '—';
    const type        = plCv(item, PL.PROJECT_TYPE).t || '';
    const owner       = plCv(item, PL.OWNER).t || '';
    const derivedStatus = deriveStatus(stage);
    const isDone    = derivedStatus === 'הסתיימה';
    const isHold    = derivedStatus === 'למעקב';
    const isRedFlag = stage === 'RED FLAG';

    const hubTasks = hubByBoardName.get(item.name) || [];
    let maxEnd = null;
    const milestones = [];
    const seenMs = new Set();
    function pushMs(ms) {
      const key = ms.mtype + '|' + ms.date.getTime();
      if (seenMs.has(key)) return;
      seenMs.add(key);
      milestones.push(ms);
    }
    hubTasks.forEach(task => {
      const calcFlag = task.column_values?.find(cv => cv.column_id === C.CALC_DEADLINE)?.text_value;
      const status   = task.column_values?.find(cv => cv.column_id === C.STATUS)?.text_value || '';
      const endDate  = prmTaskEndDate(task);
      if (endDate && calcFlag !== 'לא' && !isDone && !isHold) {
        if (!maxEnd || endDate > maxEnd) maxEnd = endDate;
      }
      const mtype = prmClassifyHubTask(task);
      if (!mtype || !endDate) return;
      pushMs({
        name: task.name, date: endDate, mtype, status,
        isDone: status === 'הסתיימה', isCancel: status === 'מבוטלת',
      });
    });

    if (stockDate) {
      pushMs({
        name: 'מחסן · ' + item.name, date: stockDate, mtype: 'stock', status: '',
        isDone: stockDate.getTime() < todayMs, isCancel: false,
      });
    }

    const subItems = subItemsByLine.get(productLine) || [];
    subItems.forEach(sub => {
      pushMs({
        name: sub.name, date: sub.date, mtype: sub.mtype, status: '',
        isDone: sub.date.getTime() < todayMs, isCancel: false,
      });
    });

    const timelineOverrun = maxEnd && stockDate && maxEnd.getTime() > stockDate.getTime();

    let health;
    if (isDone)                                                          health = 'done';
    else if (isHold)                                                     health = 'hold';
    else if (isRedFlag || timelineOverrun)                               health = 'red';
    else if (stockDate && stockDate.getTime() <= todayMs + 30*864e5)     health = 'yellow';
    else if (launchDate && launchDate.getTime() < todayMs)               health = 'done';
    else                                                                 health = 'green';

    if (launchDate && launchDate.getTime() < todayMs) {
      const allMsDone = milestones.length > 0 && milestones.every(m => m.isDone || m.isCancel);
      if (allMsDone) health = 'done';
    }

    const category = prmExtractCategory(item.name);
    return {
      ...item, launchDate, stockDate, stage, productLine, type, owner, category,
      derivedStatus, milestones, maxEnd, timelineOverrun, isDone, isHold, isRedFlag, health,
    };
  }

  const allParsed = items.map(parseProduct);

  let parsed = allParsed.filter(p => p.launchDate);
  const search = prmF.search.trim().toLowerCase();
  if (search)            parsed = parsed.filter(p => p.name.toLowerCase().includes(search) || (p.productLine||'').toLowerCase().includes(search));
  if (prmF.category !== 'all') parsed = parsed.filter(p => p.category === prmF.category);
  if (prmF.status   !== 'all') {
    const def = PRM_STATUSES.find(s => s.key === prmF.status);
    if (def) parsed = parsed.filter(def.test);
  }

  const statusCounts = {};
  PRM_STATUSES.forEach(s => statusCounts[s.key] = allParsed.filter(p => p.launchDate && s.test(p)).length);

  const allCategories = [...new Set(allParsed.filter(p => p.launchDate).map(p => p.category).filter(Boolean))].sort();

  parsed.sort((a,b) => a.launchDate.getTime() - b.launchDate.getTime());

  const allDates = [];
  parsed.forEach(p => {
    allDates.push(p.launchDate);
    p.milestones.forEach(m => { if (prmF.show[m.mtype]) allDates.push(m.date); });
  });
  allDates.push(today);

  if (parsed.length === 0) {
    document.getElementById('content').innerHTML = `
    <div class="page prm-page">
      ${prmHeader(0, null, null)}
      ${prmControls(allCategories, statusCounts)}
      <div class="ms-card"><div class="ms-card-body"><div class="prm-empty">
        <div style="font-size:42px;margin-bottom:10px">🚀</div>
        <div style="font-family:'Suez One',serif;font-size:18px;color:var(--ink);margin-bottom:6px">לא נמצאו השקות</div>
        <div>נסה לשנות פילטרים או להוסיף תאריך השקה לפריטים בבורד הפורטפוליו.</div>
      </div></div></div>
    </div>`;
    return;
  }

  const spanMinRaw = new Date(Math.min(...allDates.map(d => d.getTime())));
  const spanMaxRaw = new Date(Math.max(...allDates.map(d => d.getTime())));
  const spanMin = new Date(spanMinRaw.getFullYear(), spanMinRaw.getMonth(), 1);
  const spanMax = new Date(spanMaxRaw.getFullYear(), spanMaxRaw.getMonth() + 1, 0);

  const SCALE_PX = { months: 220, weeks: 110, days: 44, quarters: 600 };
  const unitPx = SCALE_PX[prmF.scale] || 220;

  function buildAxis() {
    const cells = [];
    if (prmF.scale === 'months') {
      let d = new Date(spanMin);
      while (d <= spanMax) {
        cells.push({ label: d.toLocaleDateString('he-IL', { month:'long' }), year: d.getFullYear(), start: new Date(d) });
        d = new Date(d.getFullYear(), d.getMonth()+1, 1);
      }
    } else if (prmF.scale === 'quarters') {
      let y = spanMin.getFullYear(), q = Math.floor(spanMin.getMonth()/3);
      const endY = spanMax.getFullYear(), endQ = Math.floor(spanMax.getMonth()/3);
      while (y < endY || (y === endY && q <= endQ)) {
        cells.push({ label: `Q${q+1}`, year: y, start: new Date(y, q*3, 1) });
        q++; if (q > 3) { q = 0; y++; }
      }
    } else if (prmF.scale === 'weeks') {
      let d = new Date(spanMin);
      d.setDate(d.getDate() - d.getDay());
      while (d <= spanMax) {
        cells.push({ label: `${d.getDate()}.${d.getMonth()+1}`, year: d.getFullYear(), start: new Date(d) });
        d = new Date(d.getFullYear(), d.getMonth(), d.getDate()+7);
      }
    } else {
      let d = new Date(spanMin);
      while (d <= spanMax) {
        cells.push({ label: `${d.getDate()}`, year: d.getFullYear(), start: new Date(d), short: `${d.getDate()}.${d.getMonth()+1}` });
        d = new Date(d.getFullYear(), d.getMonth(), d.getDate()+1);
      }
    }
    return cells;
  }
  const axis = buildAxis();
  const canvasWidth = axis.length * unitPx;

  function xForDate(d) {
    if (prmF.scale === 'months') {
      const monthIdx = (d.getFullYear() - spanMin.getFullYear()) * 12 + (d.getMonth() - spanMin.getMonth());
      const daysInMonth = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
      const dayFrac = (d.getDate() - 1) / daysInMonth;
      return (monthIdx + dayFrac) * unitPx;
    }
    if (prmF.scale === 'quarters') {
      const totalMonths = (d.getFullYear() - spanMin.getFullYear()) * 12 + (d.getMonth() - spanMin.getMonth());
      const qIdx = Math.floor(totalMonths / 3);
      const monthInQ = totalMonths % 3;
      const daysInMonth = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
      return (qIdx + (monthInQ + (d.getDate()-1)/daysInMonth) / 3) * unitPx;
    }
    if (prmF.scale === 'weeks') {
      const start = new Date(spanMin);
      start.setDate(start.getDate() - start.getDay());
      const diffDays = (d.getTime() - start.getTime()) / 864e5;
      return (diffDays / 7) * unitPx;
    }
    const diffDays = (d.getTime() - spanMin.getTime()) / 864e5;
    return diffDays * unitPx;
  }

  function assignRows(list, halfWidth, padX) {
    const rowEnds = [];
    list.forEach(item => {
      const x = item._x;
      const left = x - halfWidth;
      const right = x + halfWidth + padX;
      let placed = false;
      for (let i = 0; i < rowEnds.length; i++) {
        if (rowEnds[i] <= left) { rowEnds[i] = right; item._row = i; placed = true; break; }
      }
      if (!placed) { rowEnds.push(right); item._row = rowEnds.length - 1; }
    });
    return rowEnds.length;
  }

  parsed.forEach(p => { p._x = xForDate(p.launchDate); });
  const launchRows = assignRows(parsed, 75, 10);
  const launchRowH = 78;

  const allMilestones = [];
  parsed.forEach(p => {
    p.milestones.forEach(m => {
      if (!prmF.show[m.mtype]) return;
      allMilestones.push({ ...m, product: p, _x: xForDate(m.date), launchX: p._x, launchRow: p._row });
    });
  });
  allMilestones.sort((a,b) => a._x - b._x);
  const msRows = assignRows(allMilestones, 50, 6);
  const msRowH = 64;

  const launchBandH = Math.max(launchRows, 1) * launchRowH + 12;
  const msBandH     = Math.max(msRows, 1) * msRowH + 24;
  const trackH      = launchBandH + msBandH;

  const todayX = xForDate(today);

  function lineColor(m) {
    const launchDate = m.product.launchDate;
    const diffDays = (launchDate.getTime() - m.date.getTime()) / 864e5;
    if (diffDays < 0)  return { c:'var(--red-fg)',    s:'red'   };
    if (diffDays < 7)  return { c:'var(--yellow-fg)', s:'yellow'};
    return { c:'var(--green-fg)', s:'green' };
  }

  let connectors = '';
  allMilestones.forEach(m => {
    const lc = lineColor(m);
    const x1 = m._x;
    const y1 = launchBandH + m._row * msRowH + 18;
    const x2 = m.launchX;
    const y2 = m.launchRow * launchRowH + launchRowH - 12;
    const midY = (y1 + y2) / 2;
    connectors += `<path d="M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}" stroke="${lc.c}" stroke-width="1.4" stroke-dasharray="4 3" fill="none" opacity="0.7"/>`;
  });

  const launchHtml = parsed.map(p => {
    const fmt = `${p.launchDate.getDate()}.${p.launchDate.getMonth()+1}`;
    const top = p._row * launchRowH + 4;
    const left = p._x - 75;
    const hClass = p.health === 'done' ? 'הושק' : p.health === 'red' ? 'איחור' : p.health === 'yellow' ? 'סיכון' : p.health === 'hold' ? 'מוקפא' : 'בזמן';
    return `<div class="prm-launch" data-h="${p.health}" style="top:${top}px;left:${left}px;width:150px"
              title="${p.name} · ${p.productLine} · ${fmt}">
      <div class="prm-launch-top"><span class="prm-launch-icon">🚩</span><span>${p.name}</span></div>
      <div class="prm-launch-date">השקה · ${fmt}</div>
      <div class="prm-launch-pl">${p.productLine}${p.type ? ' · '+p.type : ''}</div>
    </div>`;
  }).join('');

  const msHtml = allMilestones.map(m => {
    const def = PRM_MTYPES[m.mtype];
    const fmt = `${m.date.getDate()}.${m.date.getMonth()+1}`;
    const top = m._row * msRowH + 4;
    const left = m._x - 50;
    return `<div class="prm-milestone" data-t="${m.mtype}" style="top:${top}px;left:${left}px"
              title="${m.name} · ${def.he} · ${fmt}">
      <div class="prm-milestone-bubble">${def.icon}</div>
      <div class="prm-milestone-name">${m.product.name}</div>
      <div class="prm-milestone-date">${fmt}</div>
    </div>`;
  }).join('');

  const axisHtml = axis.map(c => `
    <div class="prm-axis-cell" style="width:${unitPx}px">
      <div class="prm-axis-year">${c.year}</div>
      <div class="prm-axis-label">${c.label}</div>
    </div>`).join('');

  const gridLines = axis.map((_, i) =>
    `<div class="prm-grid-line" style="left:${i*unitPx}px"></div>`
  ).join('');

  const future = parsed.filter(p => p.launchDate.getTime() >= todayMs && p.health !== 'hold');
  const nextLaunch = future.length ? future.sort((a,b)=>a.launchDate-b.launchDate)[0] : null;

  document.getElementById('content').innerHTML = `
  <div class="page prm-page">
    ${prmHeader(parsed.length, spanMinRaw, spanMaxRaw)}
    ${nextLaunch ? prmNextCard(nextLaunch, today) : ''}
    ${prmControls(allCategories, statusCounts)}
    <div class="prm-canvas-wrap">
      <div class="prm-canvas" style="width:${canvasWidth}px">
        <div class="prm-axis">${axisHtml}</div>
        <div class="prm-track" style="height:${trackH}px;position:relative">
          ${gridLines}
          <div class="prm-today-line" style="left:${todayX}px"></div>
          <div class="prm-today-label" style="left:${todayX}px">היום · ${today.getDate()}/${today.getMonth()+1}/${today.getFullYear()}</div>
          <div class="prm-launches-band" style="position:absolute;top:0;left:0;right:0;height:${launchBandH}px">
            ${launchHtml}
          </div>
          <div class="prm-milestones-band" style="position:absolute;top:${launchBandH}px;left:0;right:0;height:${msBandH}px">
            ${msHtml}
          </div>
          <svg class="prm-connectors" width="${canvasWidth}" height="${trackH}" viewBox="0 0 ${canvasWidth} ${trackH}">
            ${connectors}
          </svg>
        </div>
      </div>
    </div>
    ${prmLegend()}
  </div>`;

  const todayEl = document.querySelector('.prm-today-line');
  if (todayEl && todayEl.parentElement) {
    const wrap = document.querySelector('.prm-canvas-wrap');
    if (wrap) wrap.scrollLeft = Math.max(0, todayX - wrap.clientWidth * 0.35);
  }
}

// ══════════════════════════════════════════════════
// TECH GO-LIVE ROADMAP — pipeline board only
// ══════════════════════════════════════════════════
const TGL_STATUS_BUCKETS = {
  planned:  { he:'מתוכנן',     en:'Planned',     stages:['Backlog','Discovery & Planning','Technical Specs','UI/UX Design'], color:'#94a3b8' },
  progress: { he:'בעבודה',      en:'In progress', stages:['In Development','QA & Testing','Launch Prep'],                     color:'#c2773f' },
  live:     { he:'עלה לאוויר',   en:'Live',        stages:['Go Live'],                                                          color:'#3f8a5e' },
};
const TGL_EXCLUDE_STAGES = new Set(['On Hold','Cancelled']);

const tglF = { status: 'all', team: 'all' };
function setTglStatus(v) { tglF.status = v; renderRoadmap(); }
function setTglTeam(v)   { tglF.team   = v; renderRoadmap(); }

function tglBucket(stage) {
  for (const [k, def] of Object.entries(TGL_STATUS_BUCKETS)) {
    if (def.stages.includes(stage)) return k;
  }
  return null;
}

function tglParseQuarters(qStr) {
  if (!qStr) return [];
  return qStr.split(',').map(s => s.trim()).map(s => {
    const m = s.match(/Q([1-4])\s+(\d{4})/);
    return m ? { q: +m[1], y: +m[2] } : null;
  }).filter(Boolean);
}

function renderRoadmap() {
  const ps      = pipelineProjects || [];
  const todayMs = new Date().setHours(0,0,0,0);
  const today   = new Date(todayMs);

  let proj = ps.filter(p => {
    if (TGL_EXCLUDE_STAGES.has(p.devStage)) return false;
    return !!tglBucket(p.devStage);
  });

  const teamCounts = {};
  proj.forEach(p => {
    const t = p.pm || '—';
    teamCounts[t] = (teamCounts[t] || 0) + 1;
  });
  const allTeams = Object.keys(teamCounts).filter(t => t !== '—').sort((a,b) => teamCounts[b] - teamCounts[a]);

  if (tglF.team !== 'all')   proj = proj.filter(p => (p.pm||'—') === tglF.team);
  if (tglF.status !== 'all') proj = proj.filter(p => tglBucket(p.devStage) === tglF.status);

  const total    = proj.length;
  const liveCnt  = proj.filter(p => tglBucket(p.devStage) === 'live').length;
  const progCnt  = proj.filter(p => tglBucket(p.devStage) === 'progress').length;
  const planCnt  = proj.filter(p => tglBucket(p.devStage) === 'planned').length;

  const deptAgg = new Map();
  proj.forEach(p => {
    const dept = p.department || 'לא משויך';
    if (!deptAgg.has(dept)) deptAgg.set(dept, { name: dept, days: 0, count: 0, byStatus: {planned:0, progress:0, live:0} });
    const a = deptAgg.get(dept);
    a.days  += +(p.spPlan || 0);
    a.count += 1;
    a.byStatus[tglBucket(p.devStage)] = (a.byStatus[tglBucket(p.devStage)]||0) + +(p.spPlan || 0);
  });
  const deptRows = [...deptAgg.values()].sort((a,b) => b.days - a.days);
  const totalDays = deptRows.reduce((s,d) => s+d.days, 0);

  const typeAgg = new Map();
  proj.forEach(p => {
    const t = (p.devType || 'אחר').replace(/[^\p{L}\p{N}\s&\/]+/gu,'').trim() || 'אחר';
    if (!typeAgg.has(t)) typeAgg.set(t, { name: t, count: 0, days: 0 });
    const a = typeAgg.get(t);
    a.count += 1;
    a.days  += +(p.spPlan || 0);
  });
  const typeRows = [...typeAgg.values()].sort((a,b) => b.count - a.count);
  const typeTotalCount = typeRows.reduce((s,t) => s+t.count, 0);
  const typeColors = ['#3b82f6','#c2773f','#7c6fff','#3ecf8e','#d97706','#a855f7','#0ea5e9','#94a3b8'];

  const teamAgg = new Map();
  proj.forEach(p => {
    const t = p.pm || 'ללא PM';
    if (!teamAgg.has(t)) teamAgg.set(t, { name: t, count: 0 });
    teamAgg.get(t).count += 1;
  });
  const teamRows = [...teamAgg.values()].sort((a,b) => b.count - a.count);
  const teamMaxCount = teamRows.length ? teamRows[0].count : 1;
  const teamColors = ['#3b82f6','#7c6fff','#c2773f','#3ecf8e','#d97706','#a855f7','#D05A72','#0ea5e9','#94a3b8'];

  const quarterAgg = { 1:{planned:0,progress:0,live:0,total:0}, 2:{planned:0,progress:0,live:0,total:0}, 3:{planned:0,progress:0,live:0,total:0}, 4:{planned:0,progress:0,live:0,total:0} };
  proj.forEach(p => {
    const qs = tglParseQuarters(p.quarter);
    const b  = tglBucket(p.devStage);
    qs.forEach(({q,y}) => {
      if (y !== 2026 || !quarterAgg[q]) return;
      quarterAgg[q][b]++;
      quarterAgg[q].total++;
    });
  });
  const quarterMax = Math.max(1, ...[1,2,3,4].map(q => quarterAgg[q].total));

  function quarterColX(q, monthInQ, dayInMonth) {
    const colW = 1 / 4;
    const base = (q - 1) * colW;
    const monthOff = ((monthInQ - 1) + (dayInMonth - 1) / 31) / 3;
    return (base + monthOff * colW) * 100;
  }

  function projectSpanPct(p) {
    const qs = tglParseQuarters(p.quarter);
    if (qs.length === 0 && p.tl && p.tl.from && p.tl.to) {
      const f = new Date(p.tl.from), t = new Date(p.tl.to);
      return { left: quarterColX(Math.floor(f.getMonth()/3)+1, (f.getMonth()%3)+1, f.getDate()),
               right: quarterColX(Math.floor(t.getMonth()/3)+1, (t.getMonth()%3)+1, t.getDate()) };
    }
    if (qs.length === 0 && p.deadline) {
      const d = new Date(p.deadline);
      const q = Math.floor(d.getMonth()/3)+1;
      return { left: quarterColX(q, 1, 1), right: quarterColX(q, (d.getMonth()%3)+1, d.getDate()) };
    }
    if (qs.length === 0) return null;
    const q26 = qs.filter(x => x.y === 2026).map(x => x.q);
    if (!q26.length) return null;
    const qMin = Math.min(...q26), qMax = Math.max(...q26);
    return { left: quarterColX(qMin, 1, 1), right: quarterColX(qMax, 3, 28) };
  }

  function projectPct(p) {
    if (p.hub && typeof p.hub.completionPct === 'number') return p.hub.completionPct;
    const b = tglBucket(p.devStage);
    if (b === 'live') return 100;
    if (b === 'planned') return 0;
    return 50;
  }

  proj.sort((a,b) => {
    const ba = tglBucket(a.devStage), bb = tglBucket(b.devStage);
    const order = { live: 0, progress: 1, planned: 2 };
    if (order[ba] !== order[bb]) return order[ba] - order[bb];
    const sa = projectSpanPct(a), sb = projectSpanPct(b);
    return ((sa?.left ?? 100) - (sb?.left ?? 100));
  });

  const todayPct = quarterColX(Math.floor(today.getMonth()/3)+1, (today.getMonth()%3)+1, today.getDate());

  document.getElementById('content').innerHTML = `
  <div class="page tgl-page">
    ${tglHeader(today, allTeams)}
    ${tglKpiRow(total, liveCnt, progCnt, planCnt, ps.length)}
    <div class="tgl-grid">
      <div class="tgl-side">
        ${tglDeptCard(deptRows, totalDays)}
        ${tglTypeCard(typeRows, typeTotalCount, typeColors)}
        ${tglTeamCard(teamRows, teamMaxCount, teamColors)}
        ${tglQuartCard(quarterAgg, quarterMax)}
      </div>
      ${tglGantt(proj, todayPct, projectSpanPct, projectPct)}
    </div>
    ${tglFooter()}
  </div>`;
}

function tglHeader(today, allTeams) {
  const dateStr = `${today.getDate()} · ${today.toLocaleDateString('en-US',{month:'short'})} · ${today.getFullYear()}`;
  const statusChips = ['all', ...Object.keys(TGL_STATUS_BUCKETS)].map(k => {
    const label = k === 'all' ? 'הכל' : TGL_STATUS_BUCKETS[k].he;
    return `<button class="tgl-chip ${tglF.status===k?'active':''}" onclick="setTglStatus('${k}')">${label}</button>`;
  }).join('');
  const teamChips = ['all', ...allTeams].map(t => {
    const label = t === 'all' ? 'הכל' : t;
    const safe = t.replace(/'/g,"\\'");
    return `<button class="tgl-chip ${tglF.team===t?'active':''}" onclick="setTglTeam('${safe}')">${label}</button>`;
  }).join('');
  return `
  <div class="tgl-head">
    <div>
      <div class="tgl-asof">AS OF</div>
      <div class="tgl-asof-date">${dateStr}</div>
    </div>
    <div class="tgl-title-block">
      <div class="tgl-eyebrow">Mayven · Roadmap 2026</div>
      <div class="tgl-title">מפת דרכים שנתית — עליות לאוויר 2026</div>
      <div class="tgl-filter-row">
        ${statusChips}
        <span class="tgl-filter-label">Status</span>
      </div>
      <div class="tgl-filter-row">
        ${teamChips}
        <span class="tgl-filter-label">Teams</span>
      </div>
    </div>
  </div>`;
}

function tglKpiRow(total, liveCnt, progCnt, planCnt, totalAll) {
  const pct = n => totalAll ? Math.round(n / totalAll * 100) : 0;
  const card = (label, num, pctNum, sub, dot) => `
    <div class="tgl-kpi">
      <div class="tgl-kpi-top">
        <span class="tgl-kpi-dot" style="background:${dot}"></span>
        <div class="tgl-kpi-label">${label}</div>
      </div>
      <div class="tgl-kpi-num">${num}</div>
      <div class="tgl-kpi-foot">
        <span class="tgl-kpi-sub">${sub}</span>
        <span class="tgl-kpi-pct">${pctNum}%</span>
      </div>
    </div>`;
  return `
  <div class="tgl-kpi-row">
    ${card('סך פיצ׳רים בתכנית',    total,    100,         'פיתוחים חדשים · שנת 2026', '#3ecf8e')}
    ${card('עלו לאוויר',           liveCnt,  pct(liveCnt),'Live in production',        TGL_STATUS_BUCKETS.live.color)}
    ${card('בעבודה כעת',           progCnt,  pct(progCnt),'In progress',               TGL_STATUS_BUCKETS.progress.color)}
    ${card('מתוכנן להמשך השנה',    planCnt,  pct(planCnt),'Planned · H2',              TGL_STATUS_BUCKETS.planned.color)}
  </div>`;
}

function tglDeptCard(rows, totalDays) {
  const maxDays = rows.length ? rows[0].days : 1;
  const rowsHtml = rows.map(r => {
    const w = maxDays ? (r.days / maxDays * 100) : 0;
    const segs = ['planned','progress','live'].map(k => {
      const d = r.byStatus[k] || 0;
      if (!d || !r.days) return '';
      return `<div class="tgl-dept-seg" style="width:${(d/r.days*100).toFixed(1)}%;background:${TGL_STATUS_BUCKETS[k].color}"></div>`;
    }).join('');
    return `<div class="tgl-dept-row">
      <div class="tgl-dept-days">${r.days}<span class="tgl-dept-days-unit">d</span></div>
      <div>
        <div class="tgl-dept-bar" style="width:${w}%">${segs}</div>
      </div>
      <div>
        <div class="tgl-dept-label">${r.name}</div>
        <div class="tgl-dept-count">${r.count} פיצ׳רים</div>
      </div>
    </div>`;
  }).join('');
  return `
  <div class="tgl-card">
    <div class="tgl-card-head">
      <div>
        <div class="tgl-card-total">${totalDays}<span class="tgl-card-total-unit"> dev-days · total</span></div>
      </div>
      <div>
        <div class="tgl-card-title">ימי פיתוח לפי מחלקה מבקשת</div>
        <div class="tgl-card-sub">סך ימי הפיתוח המוקצים למחלקה.<br>צבע הסגמנט = סטטוס.</div>
      </div>
    </div>
    ${rowsHtml || '<div class="tgl-card-sub" style="text-align:center;padding:12px">אין נתונים</div>'}
  </div>`;
}

function tglTypeCard(rows, totalCount, palette) {
  const segs = rows.map((r,i) => {
    const w = totalCount ? (r.count / totalCount * 100) : 0;
    return { ...r, w, color: palette[i % palette.length] };
  });
  const segHtml = segs.map(s => `<div class="tgl-stack-seg" style="width:${s.w}%;background:${s.color}">${s.w >= 8 ? Math.round(s.w)+'%' : ''}</div>`).join('');
  const legHtml = segs.map(s => `
    <div class="tgl-stack-leg">
      <span class="tgl-stack-leg-val">${s.count} · ${s.days}d</span>
      <span class="tgl-stack-leg-name">${s.name}</span>
      <span class="tgl-stack-leg-dot" style="background:${s.color}"></span>
    </div>`).join('');
  return `
  <div class="tgl-card">
    <div class="tgl-card-head">
      <div></div>
      <div>
        <div class="tgl-card-title">חלוקה לפי סוג פיתוח</div>
        <div class="tgl-card-sub">חלוקת ה-${totalCount} פיצ׳רים לפי סוג. כל קטע = % מהפיצ׳רים.</div>
      </div>
    </div>
    <div class="tgl-stack-bar">${segHtml || ''}</div>
    <div class="tgl-stack-legend">${legHtml}</div>
  </div>`;
}

function tglTeamCard(rows, maxCount, palette) {
  const rowsHtml = rows.map((r,i) => {
    const w = (r.count / maxCount * 100);
    const color = palette[i % palette.length];
    return `<div class="tgl-team-row">
      <div class="tgl-team-num">${r.count}</div>
      <div class="tgl-team-bar"><div class="tgl-team-bar-fill" style="width:${w}%;background:${color}"></div></div>
      <div class="tgl-team-info">
        <div class="tgl-team-name">${r.name}</div>
        <div class="tgl-team-sub">${r.count} פיצ׳רים פעילים</div>
      </div>
    </div>`;
  }).join('');
  return `
  <div class="tgl-card">
    <div class="tgl-card-head">
      <div></div>
      <div>
        <div class="tgl-card-title">חלוקה לפי צוותים</div>
        <div class="tgl-card-sub">כמה פיצ׳רים פעילים תחת כל PM/אחראי לאורך השנה.</div>
      </div>
    </div>
    ${rowsHtml || '<div class="tgl-card-sub" style="text-align:center;padding:12px">אין נתונים</div>'}
  </div>`;
}

function tglQuartCard(qAgg, qMax) {
  const cols = [1,2,3,4].map(q => {
    const data = qAgg[q];
    const segs = ['planned','progress','live'].map(k => {
      const cnt = data[k] || 0;
      if (!cnt) return '';
      const h = cnt / qMax * 100;
      return `<div class="tgl-quart-seg" style="height:${h}%;background:${TGL_STATUS_BUCKETS[k].color}"></div>`;
    }).join('');
    return `<div class="tgl-quart-col">
      <div class="tgl-quart-bar" style="height:${(data.total/qMax*100).toFixed(1)}%">${segs}</div>
      <div class="tgl-quart-label"><span class="tgl-quart-name">Q${q}</span><span class="tgl-quart-num">${data.total}</span></div>
    </div>`;
  }).join('');
  return `
  <div class="tgl-card">
    <div class="tgl-card-head">
      <div></div>
      <div>
        <div class="tgl-card-title">קצב מסירה רבעוני</div>
        <div class="tgl-card-sub">כל עמודה: מספר פיצ׳רים שמתחילים ברבעון, מחולקים לפי סטטוס.</div>
      </div>
    </div>
    <div class="tgl-quart-chart">${cols}</div>
  </div>`;
}

function tglGantt(proj, todayPct, spanFn, pctFn) {
  const qHeads = [
    { n:1, mo:'Jan–Mar' },
    { n:2, mo:'Apr–Jun' },
    { n:3, mo:'Jul–Sep' },
    { n:4, mo:'Oct–Dec' },
  ];
  const headHtml = qHeads.map(q => `
    <div class="tgl-gantt-th gantt-q">
      <span class="tgl-gantt-q-mark">Q${q.n}</span>
      <span class="tgl-gantt-q-months">${q.mo}</span>
    </div>`).join('');

  const rowsHtml = proj.map((p, i) => {
    const span = spanFn(p);
    const bucket = tglBucket(p.devStage);
    const pct = pctFn(p);
    const id = 'F' + String(i+1).padStart(2,'0');
    let bar = '';
    if (span) {
      const left  = span.left;
      const width = Math.max(2, span.right - span.left);
      const fillW = Math.max(0, Math.min(100, pct));
      bar = `<div class="tgl-gantt-bar" data-st="${bucket}" style="left:${left}%;width:${width}%">

      </div>`;
    }

      <div class="tgl-gantt-cell idx">${id}</div>
      <div class="tgl-gantt-cell">
