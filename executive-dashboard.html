function _renderRoadmap_LEGACY_UNUSED(ps) {
  window.__rmPs = ps;
  const todayMs = new Date().setHours(0,0,0,0);
  const today   = new Date(todayMs);

  // Only projects that have a launchDate or deadline
  let proj = ps.filter(p => p.launchDate || p.deadline);
  if (rmF.hideCompleted) proj = proj.filter(p => p.health !== 'done' && p.health !== 'cancel');
  if (rmF.env !== 'all') proj = proj.filter(p => (p.environment||'').includes(rmF.env));

  // Sort by launch date ascending
  proj = proj.slice().sort((a,b) => {
    const da = (a.launchDate||a.deadline).getTime();
    const db = (b.launchDate||b.deadline).getTime();
    return da - db;
  });

  // KPI
  const total      = proj.length;
  const lateProj   = proj.filter(p => p.health === 'red');
  const riskProj   = proj.filter(p => p.health === 'yellow');
  const doneProj   = proj.filter(p => p.health === 'done');
  const upcoming30 = proj.filter(p => {
    const d = p.launchDate||p.deadline;
    return d && d.getTime() >= todayMs && d.getTime() <= todayMs + 30*864e5;
  });

  // Find span for gantt bars (min baseline or earliest launch, max latest launch)
  const allDates = proj.flatMap(p => [p.baselineDate, p.launchDate, p.deadline].filter(Boolean));
  const spanMin  = allDates.length ? new Date(Math.min(...allDates.map(d=>d.getTime()))) : new Date();
  const spanMax  = allDates.length ? new Date(Math.max(...allDates.map(d=>d.getTime()))) : new Date();
  const spanMs   = Math.max(spanMax.getTime() - spanMin.getTime(), 864e5);

  // Env options
  const envSet = new Set(proj.map(p => p.environment).filter(Boolean));

  // Group by quarter label
  function getQuarterLabel(d) {
    if (!d) return 'ללא תאריך';
    const y = d.getFullYear(), m = d.getMonth();
    const q = Math.floor(m/3)+1;
    return `Q${q} ${y}`;
  }

  const quarterMap = new Map();
  proj.forEach(p => {
    const refDate = p.launchDate || p.deadline;
    const qLabel  = getQuarterLabel(refDate);
    if (!quarterMap.has(qLabel)) quarterMap.set(qLabel, { label: qLabel, date: refDate, items: [] });
    quarterMap.get(qLabel).items.push(p);
  });

  // Sort quarters
  const quarters = [...quarterMap.values()].sort((a,b) => a.date - b.date);

  // ── Single row HTML ──
  function rowHtml(p) {
    const refDate    = p.launchDate || p.deadline;
    const isDone     = p.health === 'done';
    const isLate     = p.health === 'red';
    const isRisk     = p.health === 'yellow';

    const diffDays   = refDate ? Math.round((refDate.getTime() - todayMs) / 864e5) : null;
    const daysColor  = isDone ? 'done' : isLate ? 'red' : isRisk ? 'yellow' : 'green';
    const daysText   = isDone ? '✓'
      : diffDays === null ? '—'
      : diffDays === 0    ? 'היום'
      : Math.abs(diffDays).toString();
    const daysUnit   = isDone ? 'הושלם'
      : diffDays === null ? ''
      : diffDays < 0      ? `ימי איחור`
      : diffDays === 0    ? ''
      : 'ימים';

    // Stage pill
    const stageColors = { 'Go Live':'#059669','Launch Prep':'#d97706','In Development':'#D05A72',
      'QA & Testing':'#7c3aed','UI/UX Design':'#a855f7','Discovery & Planning':'#3b82f6',
      'Technical Specs':'#6366f1','Backlog':'#94a3b8','On Hold':'#64748b' };
    const stageBg = stageColors[p.devStage] || '#64748b';

    // Gantt bar calculation (as % of global span)
    function pct(d) {
      if (!d) return null;
      return Math.max(0, Math.min(100, Math.round((d.getTime()-spanMin.getTime())/spanMs*100)));
    }
    const blPct  = pct(p.baselineDate);
    const ldPct  = pct(refDate);
    const todPct = pct(today);
    const donePct = p.completionPct;

    // Baseline → launch width
    const barLeft  = blPct !== null ? blPct : (ldPct || 0);
    const barRight = ldPct !== null ? ldPct : barLeft;
    const barW     = Math.max(1, barRight - barLeft);

    // Variance
    const varDays   = (p.baselineDate && refDate) ? Math.round((refDate.getTime()-p.baselineDate.getTime())/864e5) : null;
    const varClass  = varDays === null ? 'none' : varDays > 0 ? 'late' : 'early';
    const varTxt    = varDays === null ? '' : varDays > 0 ? `+${varDays}י׳ מבייסליין` : `${varDays}י׳ מבייסליין`;

    return `<div class="rm-row" ${isLate?'data-late':isRisk?'data-risk':isDone?'data-done':''}>
      <!-- Left: info -->
      <div class="rm-left">
        <div class="rm-name">
          ${isLate ? '<span class="rm-flag">🚩</span>' : isDone ? '<span class="rm-flag">✅</span>' : ''}
          <span>${stripE(p.name)||p.name}</span>
        </div>
        <div class="rm-tags">
          ${p.devStage   ? `<span class="rm-tag stage" style="background:${stageBg}">${p.devStage}</span>` : ''}
          ${p.environment? `<span class="rm-tag env">${p.environment}</span>` : ''}
          ${p.bizImpact  ? `<span class="rm-tag biz">${p.bizImpact}</span>` : ''}
        </div>
        <div class="rm-owner">${p.owner ? `👤 ${p.owner}` : p.team||''}</div>
      </div>

      <!-- Middle: gantt -->
      <div class="rm-mid">
        <div class="rm-dates-row">
          <span>בייסליין: <strong class="ltr">${fmtDate(p.baselineDate)}</strong></span>
          <span>השקה: <strong class="ltr" style="${isLate?'color:var(--red-fg)':''}">${fmtDate(refDate)}</strong></span>
        </div>
        <div class="rm-gantt">
          ${blPct!==null&&ldPct!==null ? `<div class="rm-gantt-baseline" style="left:${barLeft}%;width:${barW}%"></div>` : ''}
          ${isDone
            ? `<div class="rm-gantt-done" style="width:${Math.min(ldPct||100,100)}%"></div>`
            : `<div class="rm-gantt-active" style="left:${barLeft}%;width:${Math.min(barW*donePct/100,barW)}%"></div>`}
          ${todPct!==null ? `<div class="rm-gantt-today" style="left:${Math.min(Math.max(todPct,0),99)}%"></div>` : ''}
          <div class="rm-gantt-label">${donePct}%</div>
        </div>
        <div class="rm-pct-row">
          <div class="mini-track" style="width:80px"><div class="mini-fill ${isDone?'success':isLate?'accent':''}" style="width:${donePct}%"></div></div>
          <span class="rm-pct-num">${donePct}%</span>
          <span style="font-size:11px;color:rgba(26,29,35,.5)">${p.done}/${p.total} משימות</span>
          ${p.blocked ? `<span style="font-size:11px;font-weight:700;color:var(--red-fg)">· 🛑 ${p.blocked} חסומות</span>` : ''}
        </div>
      </div>

      <!-- Right: countdown -->
      <div class="rm-right">
        <div class="rm-days ${daysColor}">${daysText}</div>
        <div class="rm-days-unit">${daysUnit}</div>
        ${varTxt ? `<div class="rm-var ${varClass}">${varDays>0?'⬆':'⬇'} ${varTxt}</div>` : ''}
      </div>
    </div>`;
  }

  // ── Quarter block HTML ──
  function quarterBlockHtml(q) {
    const lateCount = q.items.filter(p=>p.health==='red').length;
    const rowsHtml  = q.items.map(rowHtml).join('');
    return `<div class="rm-quarter-block">
      <div class="rm-quarter-head">
        <span class="rm-q-label">${q.label}</span>
        <span class="rm-q-count">${q.items.length} פרויקטים</span>
        ${lateCount ? `<span class="rm-q-late">🚩 ${lateCount} באיחור</span>` : ''}
      </div>
      <div class="rm-timeline">${rowsHtml}</div>
    </div>`;
  }

  document.getElementById('content').innerHTML = `
  <div class="page">
    <div class="page-head">
      <div>
        <h1 class="page-title">📅 עלייה לאוויר</h1>
        <div class="page-sub">ציר זמן עליות לאוויר לפי תאריך בייסליין ותאריך מטרה · 🚩 דגל אדום = פרויקט שחרג מהתאריך</div>
      </div>
    </div>

    <!-- KPI strip -->
    <div class="kpi-strip kpi-strip-6" style="grid-template-columns:repeat(5,1fr)">
      <div class="kpi">
        <div class="kpi-label">פרויקטים ברוד-מאפ</div>
        <div class="kpi-value">${total}</div>
        <div class="kpi-sub">עם תאריך השקה</div>
      </div>
      <div class="kpi" data-dashed style="border-color:var(--red-fg)">
        <div class="kpi-label">🚩 באיחור</div>
        <div class="kpi-value danger">${lateProj.length}</div>
        <div class="kpi-sub">עברו את התאריך</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">⚠ בסיכון</div>
        <div class="kpi-value warning">${riskProj.length}</div>
        <div class="kpi-sub">פחות מ-14 ימים</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">ב-30 ימים הבאים</div>
        <div class="kpi-value">${upcoming30.length}</div>
        <div class="kpi-sub">צפויים להשיק</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">✅ הושלמו</div>
        <div class="kpi-value success">${doneProj.length}</div>
        <div class="kpi-sub">מתוך ${total}</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="pf-bar rm-filters">
      <span class="pf-label">סביבה:</span>
      <select class="pf-select" onchange="setRmEnv(this.value)">
        <option value="all" ${rmF.env==='all'?'selected':''}>כולן</option>
        ${[...envSet].sort().map(e=>`<option value="${e}" ${rmF.env===e?'selected':''}>${e}</option>`).join('')}
      </select>
      <div class="pf-div"></div>
      <button class="pf-toggle ${rmF.hideCompleted?'on':''}" onclick="setRmHideCompleted(!rmF.hideCompleted)">
        ${rmF.hideCompleted ? '👁 הצג הושלמו' : '🙈 הסתר הושלמו'}
      </button>
      <span style="margin-right:auto;font-size:11px;color:rgba(26,29,35,.42)">${proj.length} פרויקטים מוצגים</span>
    </div>

    <!-- Quarter blocks -->
    ${quarters.length === 0
      ? `<div class="ms-card"><div class="ms-card-body"><div class="empty"><div class="empty-icon">🔍</div><div>לא נמצאו פרויקטים עם תאריך השקה</div></div></div></div>`
      : quarters.map(quarterBlockHtml).join('')
    }
  </div>`;
}

// Pipeline filter state (persists across re-renders)
const pipeF = { groupBy: 'stage', sort: 'stage', hideDone: true, dept: 'all', stageFilter: null };

function stageColor(s) {
  const m = {
    'Backlog':               '#94a3b8',
    'Discovery & Planning':  '#3b82f6',
    'Technical Specs':       '#6366f1',
    'UI/UX Design':          '#a855f7',

function renderPipeline(ps) {

  // ── Battery bar ──
  function batteryHtml(p) {
    const hub = p.hub;
    if (!hub || hub.total === 0) {
      return `<div class="no-hub-msg">אין נתוני משימות מקושרות מהאב</div>`;
    }
    const arr   = hub.statusArr || [];
    const total = hub.total;
    const cnt   = (s) => arr.filter(x => x === s).length;
    const nDone    = cnt('הסתיימה');
    const nCancel  = cnt('מבוטלת');
    const nBlocked = cnt('דגל אדום');
    const nActive  = cnt('בעבודה') + cnt('מאושר');
    const nWait    = cnt('ממתין');
    const nBacklog = cnt('בנק משימות');
    const pct  = (n) => total ? Math.round(n / total * 100) : 0;
    const done = nDone + nCancel;

    const tlStr = hub.tlStart && hub.tlEnd
      ? `<div class="pcard-row"><span class="pcard-row-icon">📅</span><span class="pcard-row-label">טיימליין:</span><span class="pcard-row-val ltr">${fmtDate(hub.tlStart)} → ${fmtDate(hub.tlEnd)}</span></div>`
      : '';
    const effortStr = hub.effortA
      ? `<div class="pcard-row"><span class="pcard-row-icon">⏱</span><span class="pcard-row-label">שעות בפועל:</span><span class="pcard-row-val">${fmtN(hub.effortA)}</span>${hub.effortP ? `<span style="font-size:11px;color:rgba(26,29,35,.42)">/ ${fmtN(hub.effortP)} מתוכנן</span>` : ''}</div>`
      : '';

    return `<div class="battery-wrap">
        <div class="battery-header">
          <span class="battery-title">📋 התקדמות משימות</span>
          <span class="battery-pct">${done}/${total} · ${pct(done)}%</span>
        </div>
        <div class="battery-bar">
          ${nDone    ? `<div class="battery-seg" style="width:${pct(nDone)}%;background:#16a34a" title="הסתיימו ${nDone}"></div>` : ''}
          ${nActive  ? `<div class="battery-seg" style="width:${pct(nActive)}%;background:#D05A72" title="בעבודה ${nActive}"></div>` : ''}
          ${nWait    ? `<div class="battery-seg" style="width:${pct(nWait)}%;background:#d97706" title="ממתין ${nWait}"></div>` : ''}
          ${nBlocked ? `<div class="battery-seg" style="width:${pct(nBlocked)}%;background:#b91c1c" title="חסום ${nBlocked}"></div>` : ''}
          ${nCancel  ? `<div class="battery-seg" style="width:${pct(nCancel)}%;background:#cbd5e1" title="בוטל ${nCancel}"></div>` : ''}
          ${nBacklog ? `<div class="battery-seg" style="width:${pct(nBacklog)}%;background:#e2e8f0" title="בק לוג ${nBacklog}"></div>` : ''}
        </div>
        <div class="battery-legend">
          ${nDone    ? `<div class="bat-leg"><div class="bat-dot" style="background:#16a34a"></div>${nDone} הסתיימו</div>` : ''}
          ${nActive  ? `<div class="bat-leg"><div class="bat-dot" style="background:#D05A72"></div>${nActive} בעבודה</div>` : ''}
          ${nWait    ? `<div class="bat-leg"><div class="bat-dot" style="background:#d97706"></div>${nWait} ממתין</div>` : ''}
          ${nBlocked ? `<div class="bat-leg"><div class="bat-dot" style="background:#b91c1c"></div>${nBlocked} חסום</div>` : ''}
          ${nCancel  ? `<div class="bat-leg"><div class="bat-dot" style="background:#cbd5e1"></div>${nCancel} בוטל</div>` : ''}
        </div>
      </div>
      ${tlStr}${effortStr}`;
  }

  // ── Single card ──
  function cardHtml(p) {
    const sc = stageColor(p.devStage);
    const h  = p.health;

    // Deadline display
    const deadlineHtml = p.deadline ? (() => {
      const diffDays = Math.round((p.deadline.getTime() - new Date().setHours(0,0,0,0)) / 864e5);
      const relColor = diffDays < 0  ? 'var(--red-fg)'
                     : diffDays <= 7 ? 'var(--yellow-fg)'
                     :                 'rgba(26,29,35,.45)';
      const relTxt   = diffDays < 0  ? `${Math.abs(diffDays)} ימי איחור`
                     : diffDays === 0 ? 'היום!'
                     :                 `${diffDays} ימים`;
      return `<span class="pcard-row-val ltr">${fmtDate(p.deadline)}</span>
              <span class="pcard-row-rel" style="color:${relColor}">(${relTxt})</span>`;
    })() : `<span style="color:rgba(26,29,35,.38)">ללא דד-ליין</span>`;

    const impactColor = p.bizImpact === 'גבוה' ? '#b91c1c' : p.bizImpact === 'בינוני' ? '#d97706' : '#94a3b8';
    const impactHtml  = p.bizImpact
      ? `<span style="font-size:10.5px;font-weight:700;color:${impactColor};display:flex;align-items:center;gap:3px"><span style="font-size:9px">⬤</span>${p.bizImpact}</span>`
      : '';

    const spHtml = (p.spAct || p.spPlan)
      ? `<span style="font-size:11.5px;color:rgba(26,29,35,.55)">SP: <strong style="color:var(--ink);font-family:'JetBrains Mono',monospace">${p.spAct||0}</strong><span style="opacity:.5">/${p.spPlan||0}</span></span>`
      : '';

    const briefHtml = p.briefUrl
      ? `<a href="${p.briefUrl}" target="_blank" style="font-size:11.5px;color:var(--blue-fg);text-decoration:none;font-weight:600;display:flex;align-items:center;gap:3px">📎 בריף</a>`
      : '';

    return `<div class="pcard" data-hlth="${h}">
      <div class="pcard-stripe" data-hlth="${h}"></div>
      <div class="pcard-head">
        <div class="pcard-stage-row">
          <span class="pcard-stage" style="background:${sc}">${p.devStage||'—'}</span>
          ${healthHtml(h)}
        </div>
        <div class="pcard-name">${stripE(p.name)||p.name||'—'}</div>
        <div class="pcard-people">
          ${p.owner    ? `<div class="pcard-person"><span class="pcard-person-role">Owner</span> ${p.owner}</div>` : ''}
          ${p.pm       ? `<div class="pcard-person"><span class="pcard-person-role">PM</span> ${p.pm}</div>` : ''}
          ${p.department ? `<div class="pcard-person"><span class="pcard-person-role">מחלקה</span> ${p.department}</div>` : ''}
          ${p.quarter  ? `<div class="pcard-person"><span class="pcard-person-role">רבעון</span> ${p.quarter}</div>` : ''}
        </div>
      </div>

      <div class="pcard-body">
        ${batteryHtml(p)}
        <div class="pcard-row">
          <span class="pcard-row-icon">🎯</span>
          <span class="pcard-row-label">דד-ליין:</span>
          ${deadlineHtml}
        </div>
      </div>

      <div class="pcard-foot">
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
          ${spHtml}
          ${impactHtml}
        </div>
        ${briefHtml}
      </div>
    </div>`;
  }

  // ── KPI ──
  const active      = ps.filter(p => !PIPELINE_DONE_STAGES.has(p.devStage) && !PIPELINE_CANCEL_STAGES.has(p.devStage) && p.devStage !== 'On Hold' && p.devStage !== 'NTH' && p.devStage !== 'Backlog');
  const inDev       = ps.filter(p => p.devStage === 'In Development').length;
  const inQA        = ps.filter(p => p.devStage === 'QA & Testing').length;
  const done        = ps.filter(p => PIPELINE_DONE_STAGES.has(p.devStage)).length;
  const late        = ps.filter(p => p.health === 'red').length;
  const noDeadline  = ps.filter(p => p.health === 'no-deadline' && !PIPELINE_DONE_STAGES.has(p.devStage) && !PIPELINE_CANCEL_STAGES.has(p.devStage)).length;
  const spPlanTotal = ps.reduce((s,p) => s + p.spPlan, 0);
  const spActTotal  = ps.reduce((s,p) => s + p.spAct, 0);

  // ── Department options ──
  const depts = ['all', ...new Set(ps.map(p=>p.department).filter(Boolean)).values()].sort((a,b)=> a==='all'?-1:a.localeCompare(b));

  // ── Filter ──
  let filtered = ps;
  // Stage filter tile takes priority; hideDone only applies when no stage tile is active
  if      (pipeF.stageFilter === '__late__')  filtered = filtered.filter(p => p.health === 'red');
  else if (pipeF.stageFilter === '__nodl__')  filtered = filtered.filter(p => p.health === 'no-deadline' && !PIPELINE_DONE_STAGES.has(p.devStage) && !PIPELINE_CANCEL_STAGES.has(p.devStage));
  else if (pipeF.stageFilter)                filtered = filtered.filter(p => p.devStage === pipeF.stageFilter);
  if (pipeF.hideDone && !pipeF.stageFilter)  filtered = filtered.filter(p => !PIPELINE_DONE_STAGES.has(p.devStage) && !PIPELINE_CANCEL_STAGES.has(p.devStage));
  if (pipeF.dept !== 'all') filtered = filtered.filter(p => p.department === pipeF.dept);
  if (filterSearch) filtered = filtered.filter(p => (p.name||'').toLowerCase().includes(filterSearch));

  // ── Sort ──
  const healthOrder = { red:0, 'no-deadline':1, yellow:2, green:3, done:4, cancel:5 };
  const SORT_FNS = {
    stage:    (a,b) => PIPELINE_STAGE_ORDER.indexOf(a.devStage) - PIPELINE_STAGE_ORDER.indexOf(b.devStage),
    deadline: (a,b) => (!a.deadline&&!b.deadline)?0:(!a.deadline?1:(!b.deadline?-1:a.deadline-b.deadline)),
    health:   (a,b) => (healthOrder[a.health]??9) - (healthOrder[b.health]??9),
  };
  filtered = filtered.slice().sort(SORT_FNS[pipeF.sort] || SORT_FNS.stage);

  // ── Group ──
  function groupCards(arr) {
    if (pipeF.groupBy === 'none') return `<div class="pc-grid">${arr.map(cardHtml).join('')}</div>`;
    if (pipeF.groupBy === 'quarter') {
      const groups = {};
      arr.forEach(p => { const q=p.quarter||'ללא רבעון'; (groups[q]=groups[q]||[]).push(p); });
      return Object.entries(groups).sort(([a],[b])=>a.localeCompare(b)).map(([q,items]) => {
        const lateN = items.filter(p=>p.health==='red').length;
        return `<div class="pgroup">
          <div class="pgroup-head">
            <span class="pgroup-label">📅 ${q}</span>
            <span class="pgroup-count">${items.length} אפיקים</span>
            ${lateN ? `<span class="pgroup-late">⚠ ${lateN} באיחור</span>` : ''}
          </div>
          <div class="pc-grid">${items.map(cardHtml).join('')}</div>
        </div>`;
      }).join('');
    }
    // Default: stage grouping in logical dev order
    const stageGroups = {};
    arr.forEach(p => { const s=p.devStage||'—'; (stageGroups[s]=stageGroups[s]||[]).push(p); });
    const orderedKeys = PIPELINE_STAGE_ORDER.filter(s=>stageGroups[s])
      .concat(Object.keys(stageGroups).filter(s=>!PIPELINE_STAGE_ORDER.includes(s)));
    return orderedKeys.map(s => {
      const items = stageGroups[s]||[];
      const sc    = stageColor(s);
      const lateN = items.filter(p=>p.health==='red').length;
      return `<div class="pgroup">
        <div class="pgroup-head">
          <span class="pgroup-stage-pill" style="background:${sc}">${s}</span>
          <span class="pgroup-count">${items.length} אפיקים</span>
          ${lateN ? `<span class="pgroup-late">⚠ ${lateN} באיחור</span>` : ''}
        </div>
        <div class="pc-grid">${items.map(cardHtml).join('')}</div>
      </div>`;
    }).join('');
  }

  // ── Stage tile data ──
  const stageTiles = PIPELINE_STAGE_ORDER.map(s => {
    const items = ps.filter(p => p.devStage === s);
    if (!items.length) return null;
    return { stage: s, count: items.length, sp: items.reduce((a,p)=>a+p.spAct,0) };
  }).filter(Boolean);
  const lateItems = ps.filter(p => p.health === 'red');
  const noDlItems = ps.filter(p => p.health === 'no-deadline' && !PIPELINE_DONE_STAGES.has(p.devStage) && !PIPELINE_CANCEL_STAGES.has(p.devStage));

  document.getElementById('content').innerHTML = `
  <div class="page">
    <div class="page-head">
      <div>
        <h1 class="page-title">⚙️ פורטפוליו טכנולוגיה</h1>
        <div class="page-sub">Dev Project Pipeline · ${ps.length} אפיקים סה״כ · ${active.length} פעילים · ${late} באיחור</div>
      </div>
    </div>

    <!-- Stage tile strip — clickable filter -->
    <div class="pipe-tile-strip">

      <div class="pipe-tile ${!pipeF.stageFilter?'pt-active':''}"
           onclick="pipeF.stageFilter=null;renderPipeline(pipelineProjects)">
        <div class="pt-badge" style="background:rgba(26,29,35,.55)">הכל</div>
        <div class="pt-count">${ps.length}</div>
        <div class="pt-sp">SP ${spActTotal}</div>
      </div>

      ${stageTiles.map(t => `
      <div class="pipe-tile ${pipeF.stageFilter===t.stage?'pt-active':''}"
           onclick="pipeF.stageFilter=pipeF.stageFilter==='${t.stage}'?null:'${t.stage}';renderPipeline(pipelineProjects)">
        <div class="pt-badge" style="background:${stageColor(t.stage)}">${t.stage}</div>
        <div class="pt-count">${t.count}</div>
        <div class="pt-sp">SP ${t.sp||0}</div>
      </div>`).join('')}

      ${lateItems.length ? `
      <div class="pipe-tile pt-late ${pipeF.stageFilter==='__late__'?'pt-active':''}"
           onclick="pipeF.stageFilter=pipeF.stageFilter==='__late__'?null:'__late__';renderPipeline(pipelineProjects)">
        <div class="pt-badge" style="background:#b91c1c">⚠ באיחור</div>
        <div class="pt-count">${lateItems.length}</div>
        <div class="pt-sp">SP ${lateItems.reduce((a,p)=>a+p.spAct,0)}</div>
      </div>` : ''}

      ${noDlItems.length ? `
      <div class="pipe-tile pt-nodl ${pipeF.stageFilter==='__nodl__'?'pt-active':''}"
           onclick="pipeF.stageFilter=pipeF.stageFilter==='__nodl__'?null:'__nodl__';renderPipeline(pipelineProjects)">
        <div class="pt-badge" style="background:#d97706">ללא דד-ליין</div>
        <div class="pt-count">${noDlItems.length}</div>
        <div class="pt-sp">—</div>
      </div>` : ''}

    </div>

    <!-- Filter bar -->
    <div class="pf-bar">
      <span class="pf-label">קיבוץ:</span>
      <select class="pf-select" onchange="pipeF.groupBy=this.value;renderPipeline(pipelineProjects)">
        <option value="stage"   ${pipeF.groupBy==='stage'  ?'selected':''}>שלב פיתוח</option>
        <option value="quarter" ${pipeF.groupBy==='quarter'?'selected':''}>רבעון</option>
        <option value="none"    ${pipeF.groupBy==='none'   ?'selected':''}>ללא קיבוץ</option>
      </select>
      <div class="pf-div"></div>
      <span class="pf-label">מיון:</span>
      <select class="pf-select" onchange="pipeF.sort=this.value;renderPipeline(pipelineProjects)">
        <option value="stage"    ${pipeF.sort==='stage'   ?'selected':''}>שלב פיתוח</option>
        <option value="deadline" ${pipeF.sort==='deadline'?'selected':''}>דד-ליין</option>
        <option value="health"   ${pipeF.sort==='health'  ?'selected':''}>בריאות</option>
      </select>
      <div class="pf-div"></div>
      <span class="pf-label">מחלקה:</span>
      <select class="pf-select" onchange="pipeF.dept=this.value;renderPipeline(pipelineProjects)">
        ${depts.map(d=>`<option value="${d}" ${pipeF.dept===d?'selected':''}>${d==='all'?'כולן':d}</option>`).join('')}
      </select>
      <div class="pf-div"></div>
      <button class="pf-toggle ${pipeF.hideDone?'on':''}"
        onclick="pipeF.hideDone=!pipeF.hideDone;renderPipeline(pipelineProjects)">
        ${pipeF.hideDone ? '👁 הצג הושלמו/בוטלו' : '🙈 הסתר הושלמו/בוטלו'}
      </button>
      <span style="margin-right:auto;font-size:11px;color:rgba(26,29,35,.42)">${filtered.length} / ${ps.length} מוצגים</span>
    </div>

    <!-- Cards -->
    ${filtered.length === 0
      ? `<div class="ms-card"><div class="ms-card-body"><div class="empty"><div class="empty-icon">🔍</div><div>לא נמצאו אפיקים</div></div></div></div>`
      : groupCards(filtered)
    }
  </div>`;
}

// ══════════════════════════════════════════════════
// EXECUTIVE OVERVIEW (ovexec) — "תצוגה כללית"
// Page-isolated. Reads ONLY team boards (live, via team-boards-fetch) +
// portfolio globals (productLaunchItems, pipelineProjects). NEVER the Hub.
// ══════════════════════════════════════════════════
const OV_ACTIVE_SET = new Set(['בעבודה','מאושר לביצוע','ממתין לאישור מנהל','בעבודה - צד שלישי','יש לבצע תיקונים :)','אושר על ידי מנהל','למעקב','דגל אדום']);
const OV_DONE_SET   = new Set(['הסתיימה','מבוטלת','בנק משימות','מחיקה']);
const OV_MONDAY_BASE = 'https://mayven-team.monday.com/boards/';
const ovState = { boards:{}, started:false, escBound:false };

function ovTodayMs(){ return new Date(new Date().toDateString()).getTime(); }
function ovDayMs(d){ return d ? new Date(new Date(d).toDateString()).getTime() : null; }
function ovNorm(s){ return stripE(s||'').trim().toLowerCase(); }
function ovDeptColor(id){
  const i = TEAM_BOARDS.findIndex(t=>t.id===id);
  return AVATAR_COLORS[(i<0?0:i) % AVATAR_COLORS.length];
}

// Per-board column resolver — resolves by TITLE (team boards do NOT share ids).
function ovBuildColResolver(boardColumns){
  const byTitle = {};
  for (const c of (boardColumns||[])) {
    const t = (c.title || '').replace(/\s*⭐\s*$/, '').trim();
    if (t && !(t in byTitle)) byTitle[t] = c.id;
  }
  const TITLE_MAP = {
    status:         ['Status'],
    owner:          ['Owner'],
    team:           ['Team'],
    timeline:       ['Timeline'],
    startDate:      ['Start Date'],
    endDate:        ['End Date'],
    completion:     ['Completion date','Completion Date'],
    projectDeadline:['Project Deadline'],
    boardName:      ['Board Name'],
    groupName:      ['Group Name'],
    projectName:    ['Project Name'],
    projectStage:   ['Project Stage'],
    projectType:    ['Project type','Project Type','Task Type'],
    priority:       ['Priority'],
    devStatus:      ['Dev Status'],
    twoB:           ['2B Organized ⚡','2B Organized','Organized'],
    plannedEffort:  ['Planned Effort'],
    effort:         ['Effort'],
  };
  return (logical) => {
    for (const title of (TITLE_MAP[logical] || [])) if (byTitle[title]) return byTitle[title];
    return null;
  };
}

// Parallel, progressive fetch — one call per board; sections fill as data arrives.
function ovFetchBoards(){
  if (ovState.started) return;
  ovState.started = true;
  TEAM_BOARDS.forEach(tb => {
    fetch(`${TEAM_BOARDS_FETCH_URL}?board=${tb.id}`, { headers:{ 'Authorization':`Bearer ${PIPELINE_ANON_KEY}` } })
      .then(r => r.json())
      .then(json => {
        if (!json || !json.ok) throw new Error(json && json.error ? json.error : 'fetch failed');
        ovState.boards[tb.id] = ovNormalizeBoard(tb, json);
        if (activeWorld === 'ovexec') ovRenderSections();
      })
      .catch(e => {
        console.warn(`[ovexec] board ${tb.id} (${tb.he}) failed to load — skipped:`, e.message || e);
        ovState.boards[tb.id] = { tb, error:String(e.message||e), items:[], derived:[], col:()=>null };
        if (activeWorld === 'ovexec') ovRenderSections();
      });
  });
}

function ovNormalizeBoard(tb, json){
  const cols = (json.board && json.board.columns) || [];
  const col  = ovBuildColResolver(cols);
  const items = (json.items||[]).map(it => ({
    id: it.id, name: it.name, group_id: it.group_id, group_title: it.group_title,
    column_values: (it.column_values||[]).map(c => ({ column_id:c.id, text_value:c.text, value:c.value })),
  }));
  const board = { tb, name:(json.board&&json.board.name)||tb.he, columns:cols, col, items };
  board.derived = items.map(it => ovDeriveItem(board, it));
  return board;
}

function ovProjectKey(board, item){
  const pnId = board.col('projectName');
  if (pnId) { const v = cv(item, pnId).t; if (v && v.trim()) return v.trim(); }
  if (item.group_title && item.group_title.trim()) return item.group_title.trim();
  const gnId = board.col('groupName');
  if (gnId) { const v = cv(item, gnId).t; if (v && v.trim()) return v.trim(); }
  return null;
}

function ovDeriveItem(board, item){
  const col = board.col;
  const statusId = col('status');
  const status = statusId ? cv(item, statusId).t : null;
  const tlId = col('timeline');
  const tl = tlId ? parseTL(cv(item, tlId).r) : { from:null, to:null };
  const tlEnd = tl.to || null;
  const compId = col('completion');
  const completion = compId ? parseDate(cv(item, compId).t) : null;
  const ownerId = col('owner');
  const owner = ownerId ? cv(item, ownerId).t : null;
  const pdId = col('projectDeadline');
  const pd = pdId ? parseTL(cv(item, pdId).r) : { from:null, to:null };
  const isDone   = OV_DONE_SET.has(status);
  const isActive = OV_ACTIVE_SET.has(status);
  const outOfTime = !!(tlEnd && ovDayMs(tlEnd) < ovTodayMs() && !isDone);
  return { item, status, tlEnd, completion, owner, projectKey: ovProjectKey(board,item),
           projDeadlineEnd: pd.to||null, isDone, isActive, outOfTime };
}

// Portfolio cross-reference maps, keyed by normalized name.
function ovPortfolioMaps(){
  const prod = new Map();
  for (const it of (productLaunchItems||[])) {
    const k = ovNorm(it.name); if (!k) continue;
    prod.set(k, { stage: cv(it, PL.STAGE).t || '', stock: parseDate(cv(it, PL.STOCK_DATE).t) });
  }
  const pipe = new Map();
  for (const p of (pipelineProjects||[])) {
    const k = ovNorm(p.name); if (!k) continue;
    pipe.set(k, { status:p.status||null, deadline:p.deadline||null, devStage:p.devStage||null });
  }
  return { prod, pipe };
}

// Project = Monday group on a team board. Cross-referenced to portfolios.
function ovBuildProjects(loaded, maps){
  const todayMs = ovTodayMs();
  const out = [];
  for (const board of loaded) {
    const groups = new Map();
    for (const d of board.derived) {
      if (!d.projectKey) continue;
      const k = board.tb.id + '::' + d.projectKey;
      if (!groups.has(k)) groups.set(k, []);
      groups.get(k).push(d);
    }
    for (const [, ds] of groups) {
      const key = ds[0].projectKey;
      const nk  = ovNorm(key);
      const prod = maps.prod.get(nk) || null;
      const pipe = maps.pipe.get(nk) || null;
      let teamPD = null;
      for (const d of ds) if (d.projDeadlineEnd && (!teamPD || d.projDeadlineEnd>teamPD)) teamPD = d.projDeadlineEnd;
      // Deadline priority: Portfolio stock → Pipeline deadline → team Project Deadline. NEVER task timelines.
      let deadline=null, source=null;
      if (prod && prod.stock) { deadline=prod.stock; source='product'; }
      else if (pipe && pipe.deadline) { deadline=pipe.deadline; source='pipeline'; }
      else if (teamPD) { deadline=teamPD; source='team'; }
      let maxComp=null; for (const d of ds) if (d.completion && (!maxComp||d.completion>maxComp)) maxComp=d.completion;
      const active   = ds.some(d => d.isActive);
      const allDone  = ds.length>0 && ds.every(d => d.isDone);
      const complete = allDone
        || (prod && (prod.stage==='Stock Date' || prod.stage==='Go Live'))
        || (pipe && pipe.status==='הסתיימה');
      const hasRedTask = ds.some(d => d.status==='דגל אדום');
      const dlMs = ovDayMs(deadline);
      const overdue = dlMs!==null && dlMs < todayMs;
      const redFlag = (prod && prod.stage==='RED FLAG')
        || (active && deadline && overdue && !complete)
        || hasRedTask;
      const delayDays = (deadline && !complete) ? Math.max(0, Math.round((todayMs - dlMs)/864e5)) : 0;
      out.push({ key, boardId:board.tb.id, dept:board.tb.he, mgr:board.tb.mgr, emoji:board.tb.emoji,
        items:ds, active, complete, maxComp, deadline, source, dlMs, overdue, redFlag, hasRedTask,
        delayDays, prodStage: prod?prod.stage:null });
    }
  }
  return out;
}

function ovComputeKPIs(loaded, projects){
  const todayMs = ovTodayMs();
  let activeTasks=0, onTime=0, late=0;
  for (const b of loaded) for (const d of b.derived) {
    if (d.isActive) { activeTasks++; d.outOfTime ? late++ : onTime++; }
  }
  const activeProjects = projects.filter(p=>p.active);
  const redProjects    = projects.filter(p=>p.redFlag);
  const withDL         = projects.filter(p=>p.deadline && !p.complete);
  const overdue        = withDL.filter(p=>p.delayDays>0);
  const avgDelay       = withDL.length ? Math.round(withDL.reduce((s,p)=>s+p.delayDays,0)/withDL.length) : 0;
  const d30 = todayMs - 30*864e5, d60 = todayMs - 60*864e5;
  const compProjects = projects.filter(p=>p.complete && p.maxComp);
  const last30 = compProjects.filter(p=>{ const t=ovDayMs(p.maxComp); return t>=d30 && t<=todayMs; });
  const prev30 = compProjects.filter(p=>{ const t=ovDayMs(p.maxComp); return t>=d60 && t<d30; });
  const noDL   = activeProjects.filter(p=>!p.deadline);
  return { activeTasks, onTime, late, activeProjects, redProjects, withDL, overdue, avgDelay, last30, prev30, noDL };
}

function ovByDeptStr(list){
  const m={}; for (const p of list) m[p.dept]=(m[p.dept]||0)+1;
  const arr=Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,3);
  return arr.length ? arr.map(([d,n])=>`${d} ${n}`).join(' · ') : '—';
}
function ovEsc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function ovRenderSections(){
  const root = document.getElementById('ov-root');
  if (!root) return;
  const loaded   = TEAM_BOARDS.map(tb=>ovState.boards[tb.id]).filter(b=>b && !b.error);

function ovHeadHtml(loadedN, attempted, failedN){
  const total = TEAM_BOARDS.length;

  let state;
  if (attempted < total) state = `<span class="ov-spinner"></span> טוען מחלקות… ${loadedN}/${total}`;
  else if (failedN)      state = `${loadedN} מחלקות נטענו · <span class="ov-red">${failedN} נכשלו</span>`;
  else                   state = `${loadedN} מחלקות`;
  return `<div class="page-head">
    <div>
      <h1 class="page-title">🏠 תצוגה כללית</h1>
      <div class="page-sub">איפה כל המחלקות עומדות · מה דורש תשומת לב הנהלה · מקור: בורדי צוות + פורטפוליו</div>
    </div>
    <div class="ov-loadstate">${state}<div class="ov-asof mono">נכון ל-${today}</div></div>
  </div>`;
}

// ── Section A — Department rollup strip ──
function ovDeptStats(board){
  let active=0, inWork=0, approved=0, blocked=0, done=0;
  for (const d of board.derived) {
    if (d.isActive) active++;
    if (d.status==='בעבודה') inWork++;
    if (d.status==='מאושר לביצוע' || d.status==='אושר על ידי מנהל') approved++;
    if (d.status==='דגל אדום') blocked++;
    if (d.status==='הסתיימה') done++;
  }
  return { active, inWork, approved, blocked, done, total: board.derived.length };
}
function ovSectionA(loaded){
  if (!loaded.length) return `<div class="ov-section"><div class="ov-empty">טוען נתוני מחלקות…</div></div>`;
  const cards = loaded.map(b => ({ b, s: ovDeptStats(b) }))
    .sort((a,b)=> b.s.active - a.s.active)
    .map(({b,s}) => {
      const activeNB = Math.max(0, s.active - s.blocked);
      const tot = s.done + activeNB + s.blocked || 1;
      const pD = s.done/tot*100, pA = activeNB/tot*100, pB = s.blocked/tot*100;
      return `<button class="ov-dept" onclick="ovOpenDept('${b.tb.id}')">
        <div class="ov-dept-top"><span class="ov-dept-name">${b.tb.emoji} ${b.tb.he}</span><span class="ov-dept-mgr">${ovEsc(b.tb.mgr)}</span></div>
        <div class="ov-dept-num mono">${s.active}</div>
        <div class="ov-dept-sub">משימות פעילות</div>
        <div class="ov-dept-break">${s.inWork} בעבודה · ${s.approved} מאושר · <span class="ov-red">${s.blocked} דגל אדום</span></div>
        <div class="ov-bar"><div class="ov-bar-seg ov-bar-done" style="width:${pD}%"></div><div class="ov-bar-seg ov-bar-active" style="width:${pA}%"></div><div class="ov-bar-seg ov-bar-blocked" style="width:${pB}%"></div></div>
      </button>`;
    }).join('');
  return `<div class="ov-section"><div class="ov-section-h">מחלקות</div><div class="ov-dept-strip">${cards}</div></div>`;
}

// ── Section B — Company KPI cards ──
function ovKpiCard(key, q, num, breakHtml){
  return `<button class="ov-kpi" onclick="ovOpenKpi('${key}')">
    <div class="ov-kpi-q">${q}</div>
    <div class="ov-kpi-num mono">${num}</div>
    <div class="ov-kpi-break">${breakHtml}</div>
  </button>`;
}
function ovSectionB(k){
  const delta = k.last30.length - k.prev30.length;
  const deltaStr = `${delta>0?'▲ +':delta<0?'▼ ':'• '}${Math.abs(delta)} מול 30 הימים הקודמים`;
  const cards = [
    ovKpiCard('tasks','כמה משימות בעבודה?', k.activeTasks, `${k.onTime} בזמן · <span class="ov-red">${k.late} חורגות</span>`),
    ovKpiCard('projects','כמה פרויקטים פעילים?', k.activeProjects.length, ovByDeptStr(k.activeProjects)),
    ovKpiCard('red','כמה פרויקטים בדגל אדום?', k.redProjects.length, ovByDeptStr(k.redProjects)),
    ovKpiCard('delay','ממוצע פיגור בפרויקטים', `${k.avgDelay} <span class="ov-unit">ימים</span>`, `${k.overdue.length} מתוך ${k.withDL.length} פרויקטים`),
    ovKpiCard('done','הסתיימו ב-30 הימים האחרונים', k.last30.length, deltaStr),
    ovKpiCard('nodl','פרויקטים ללא דדליין', k.noDL.length, ovByDeptStr(k.noDL)),
  ].join('');
  return `<div class="ov-section"><div class="ov-kpi-grid">${cards}</div></div>`;
}

// ── Section C — דורש את תשומת ליבך ──
function ovWhyRed(p){
  if (p.prodStage==='RED FLAG') return 'דגל אדום בפורטפוליו';
  if (p.overdue && !p.complete)  return `באיחור ${p.delayDays} ימים`;
  if (p.hasRedTask)              return 'משימה בדגל אדום';
  return 'דגל אדום';
}
function ovAttentionList(projects){
  const todayMs = ovTodayMs();
  const red  = projects.filter(p=>p.redFlag)
    .map(p=>({p,cat:'red',label:'דגל אדום',why:ovWhyRed(p)}));
  const risk = projects.filter(p=>p.active && !p.complete && !p.redFlag && p.deadline && p.dlMs>=todayMs && p.dlMs<=todayMs+7*864e5)
    .map(p=>({p,cat:'risk',label:'צפוי לחרוג',why:`דד-ליין ${fmtDate(p.deadline)}`}));
  const nodl = projects.filter(p=>p.active && !p.complete && !p.deadline)
    .map(p=>({p,cat:'nodl',label:'ללא דדליין',why:'אין דד-ליין מוגדר'}));
  const order={red:0,risk:1,nodl:2};
  return [...red,...risk,...nodl].sort((a,b)=> order[a.cat]-order[b.cat] || ((a.p.dlMs??Infinity)-(b.p.dlMs??Infinity)));
}
function ovSectionC(projects){
  const rows = ovAttentionList(projects).slice(0,8).map(({p,cat,label,why}) => `
    <div class="ov-attn">
      <span class="ov-attn-pill ov-attn-${cat}">${label}</span>
      <span class="ov-attn-desc"><b>${ovEsc(p.key)}</b> — ${ovEsc(p.dept)} — ${ovEsc(why)}</span>
      <a class="ov-attn-open" href="${OV_MONDAY_BASE}${p.boardId}" target="_blank" rel="noopener">פתח →</a>
    </div>`).join('');
  const body = rows || `<div class="ov-empty">אין פריטים שדורשים תשומת לב כעת ✓</div>`;
  return `<div class="ov-section"><div class="ov-section-h">דורש את תשומת ליבך</div><div class="ov-attn-list">${body}</div></div>`;
}

// ── Section D — PROJECT-level timing (project = Monday group; one row per project) ──
// Project status roll-up follows the Mayven Way precedence: דגל אדום > הסתיימה > בעבודה > למעקב.
// Stage = team Project Stage (representative) → portfolio stage fallback → "—".
// Timeline span (min start → max end of the project's tasks) is used ONLY to test month-overlap.
function ovProjectStageStatus(p, maps){
  const board = ovState.boards[p.boardId];
  const col = (board && board.col) ? board.col : (()=>null);
  // Status roll-up
  let status;
  if (p.items.some(d=>d.status==='דגל אדום')) status='דגל אדום';
  else if (p.items.length && p.items.every(d=>d.isDone)) status='הסתיימה';
  else if (p.items.some(d=>d.isActive)) status='בעבודה';
  else status='למעקב';
  // Stage — sourced from the PORTFOLIOS (the reliable workflow stage). The team boards'
  // "Project Stage ⭐" column is a free-text mirror of the group/project name (not a real
  // stage), so it is intentionally ignored. "—" when the project has no portfolio match.
  const nk = ovNorm(p.key);
  const prod = maps.prod.get(nk) || null;
  const pipe = maps.pipe.get(nk) || null;
  let stage = '—';
  if (prod && prod.stage) stage = prod.stage;
  else if (pipe && pipe.devStage) stage = pipe.devStage;
  // Timeline span (project-level only)
  let spanStart=null, spanEnd=null;
  const tlId = col('timeline');
  if (tlId) for (const d of p.items) {
    const tl = parseTL(cv(d.item, tlId).r);
    if (tl.from){ const t=ovDayMs(tl.from); if(spanStart===null||t<spanStart)spanStart=t; }
    if (tl.to){   const t=ovDayMs(tl.to);   if(spanEnd===null  ||t>spanEnd)  spanEnd=t; }
  }
  return { status, stage, spanStart, spanEnd };
}

function ovStatusChip(status){
  const map = {'דגל אדום':'red','הסתיימה':'done','בעבודה':'work','למעקב':'watch'};
  return `<span class="ov-pchip ov-pstatus-${map[status]||'watch'}">${ovEsc(status)}</span>`;
}
function ovProjDateStr(ms){
  return (ms==null) ? '—' : new Date(ms).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'});
}
function ovProjRow(p, e, dateMs){
  const name = p.key && p.key.length>50 ? p.key.slice(0,49)+'…' : (p.key||'—');
  return `<div class="ov-proj-row">
    <span class="ov-date-pill mono">${ovProjDateStr(dateMs)}</span>
    <div class="ov-proj-main">
      <div class="ov-proj-name">${ovEsc(name)}</div>
      <div class="ov-proj-meta">${ovEsc(p.emoji)} ${ovEsc(p.dept)} · ${ovEsc(p.mgr)}</div>
    </div>
    <span class="ov-pchip ov-pchip-stage" title="שלב: ${ovEsc(e.stage)}">${ovEsc(e.stage)}</span>
    ${ovStatusChip(e.status)}
    <a class="ov-proj-open" href="${OV_MONDAY_BASE}${p.boardId}" target="_blank" rel="noopener">פתח →</a>
  </div>`;
}

function ovSectionD(projects){
  const maps = ovPortfolioMaps();
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
  const monthEnd   = new Date(now.getFullYear(), now.getMonth()+1, 0).getTime(); // last day @00:00
  const todayMs = ovTodayMs();
  const rolling30 = todayMs + 30*864e5;
  const CAP = 12;
  const moreHtml = (n)=> n>CAP ? `<div class="ov-more">+${n-CAP} נוספים</div>` : '';

  const enr = projects.map(p => ({ p, e: ovProjectStageStatus(p, maps) }));

  // LEFT — projects completed this calendar month
  const done = enr.filter(o => o.p.complete && o.p.maxComp)
    .map(o => ({ ...o, t: ovDayMs(o.p.maxComp) }))
    .filter(o => o.t>=monthStart && o.t<=monthEnd)
    .sort((a,b)=> b.t-a.t);
  const leftRows = done.length
    ? done.slice(0,CAP).map(o=>ovProjRow(o.p,o.e,o.t)).join('') + moreHtml(done.length)
    : `<div class="ov-empty">לא הסתיימו פרויקטים החודש</div>`;

  // RIGHT block 1 — launching / due this month (future-facing); fall back to rolling 30d if sparse
  let launch = enr.filter(o => !o.p.complete && o.p.dlMs!==null && o.p.dlMs>=todayMs && o.p.dlMs<=monthEnd)
    .sort((a,b)=> a.p.dlMs-b.p.dlMs);
  let launchLabel = '🚀 עולים לאוויר · יעד החודש';
  if (launch.length < 3) {
    launch = enr.filter(o => !o.p.complete && o.p.dlMs!==null && o.p.dlMs>=todayMs && o.p.dlMs<=rolling30)
      .sort((a,b)=> a.p.dlMs-b.p.dlMs);
    launchLabel = '🚀 עולים לאוויר · 30 הימים הקרובים';
  }
  const launchKeys = new Set(launch.map(o=> o.p.boardId+'::'+o.p.key));
  const launchRows = launch.length
    ? launch.slice(0,CAP).map(o=>ovProjRow(o.p,o.e,o.p.dlMs)).join('') + moreHtml(launch.length)
    : `<div class="ov-empty">אין פרויקטים שעולים החודש</div>`;

  // RIGHT block 2 — active projects whose timeline overlaps this month (not complete, not in launch)
  const planned = enr.filter(o => o.p.active && !o.p.complete
      && !launchKeys.has(o.p.boardId+'::'+o.p.key)
      && o.e.spanStart!==null && o.e.spanEnd!==null
      && o.e.spanStart<=monthEnd && o.e.spanEnd>=monthStart)
    .sort((a,b)=> ((a.p.dlMs??a.e.spanEnd??Infinity)-(b.p.dlMs??b.e.spanEnd??Infinity)));
  const plannedRows = planned.length
    ? planned.slice(0,CAP).map(o=>ovProjRow(o.p,o.e,o.p.dlMs??o.e.spanEnd)).join('') + moreHtml(planned.length)
    : `<div class="ov-empty">אין פרויקטים מתוכננים החודש</div>`;

  return `<div class="ov-section"><div class="ov-d-grid">
    <div class="ov-d-col">
      <div class="ov-section-h">פרויקטים שהסתיימו החודש</div>
      <div class="ov-proj-list">${leftRows}</div>
    </div>
    <div class="ov-d-col">
      <div class="ov-section-h">פרויקטים החודש</div>
      <div class="ov-d-block">
        <div class="ov-d-block-h">${launchLabel}</div>
        <div class="ov-proj-list">${launchRows}</div>
      </div>
      <div class="ov-d-block">
        <div class="ov-d-block-h">📅 מתוכננים החודש</div>
        <div class="ov-proj-list">${plannedRows}</div>
      </div>
    </div>
  </div></div>`;
}

// ── Modals ──
function ovOpenModal(title, html){
  const ov = document.getElementById('ov-overlay'); if (!ov) return;
  document.getElementById('ov-modal-title').innerHTML = title;
  document.getElementById('ov-modal-body').innerHTML = html;
  ov.style.display = 'flex';
}
function ovCloseModal(){ const ov=document.getElementById('ov-overlay'); if (ov) ov.style.display='none'; }

function ovTable(headers, rows){
  if (!rows.length) return `<div class="ov-empty">אין נתונים</div>`;
  return `<table class="ov-tbl"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}

function ovOpenDept(boardId){
  const b = ovState.boards[boardId]; if (!b || b.error) return;
  const todayMs = ovTodayMs();
  const rows = b.derived.filter(d=>d.isActive).map(d => ({
    name:d.item.name, project:d.projectKey||'—', owner:d.owner||'—', status:d.status||'—',
    end:d.tlEnd, od: d.outOfTime ? Math.round((todayMs-ovDayMs(d.tlEnd))/864e5) : 0,
  })).sort((a,b)=> b.od-a.od);
  const tbl = ovTable(['משימה','פרויקט','אחראי','סטטוס','סיום','פיגור'],
    rows.map(r=>[ ovEsc(r.name), ovEsc(r.project), ovEsc(r.owner),
      `<span class="ov-st">${ovEsc(r.status)}</span>`, `<span class="mono">${fmtDate(r.end)}</span>`,
      r.od>0?`<span class="ov-red mono">${r.od}י׳</span>`:'<span class="muted">—</span>' ]));
  ovOpenModal(`${b.tb.emoji} ${b.tb.he} — משימות פעילות (${rows.length})`, tbl);
}

function ovOpenKpi(which){
  const loaded   = TEAM_BOARDS.map(tb=>ovState.boards[tb.id]).filter(b=>b && !b.error);
  const maps     = ovPortfolioMaps();
  const projects = ovBuildProjects(loaded, maps);
  const k        = ovComputeKPIs(loaded, projects);
  const todayMs  = ovTodayMs();
  const projRow  = p => [ ovEsc(p.key), ovEsc(p.dept),
    p.deadline?`<span class="mono">${fmtDate(p.deadline)}</span>`:'<span class="muted">—</span>',
    p.complete?'<span class="ov-green">הושלם</span>':p.redFlag?'<span class="ov-red">דגל אדום</span>':'<span class="muted">פעיל</span>' ];
  const cap = 200;
  let title, html;
  if (which==='tasks') {
    const tasks=[]; for (const b of loaded) for (const d of b.derived) if (d.isActive)
      tasks.push({dept:b.tb.he, name:d.item.name, end:d.tlEnd, late:d.outOfTime});
    tasks.sort((a,b)=> (b.late-a.late) || ((ovDayMs(a.end)??Infinity)-(ovDayMs(b.end)??Infinity)));
    title=`משימות בעבודה (${tasks.length})`;
    html=ovTable(['מחלקה','משימה','סיום','חריגה'], tasks.slice(0,cap).map(t=>[ ovEsc(t.dept), ovEsc(t.name),
      `<span class="mono">${fmtDate(t.end)}</span>`, t.late?'<span class="ov-red">חורגת</span>':'<span class="ov-green">בזמן</span>' ]));
  } else if (which==='projects') {
    title=`פרויקטים פעילים (${k.activeProjects.length})`;
    html=ovTable(['פרויקט','מחלקה','דד-ליין','מצב'], k.activeProjects.slice(0,cap).map(projRow));
  } else if (which==='red') {
    title=`פרויקטים בדגל אדום (${k.redProjects.length})`;
    html=ovTable(['פרויקט','מחלקה','סיבה'], k.redProjects.slice(0,cap).map(p=>[ ovEsc(p.key), ovEsc(p.dept), ovEsc(ovWhyRed(p)) ]));
  } else if (which==='delay') {
    const sorted=[...k.withDL].sort((a,b)=>b.delayDays-a.delayDays);
    title=`פיגור בפרויקטים — ממוצע ${k.avgDelay} ימים (${k.withDL.length})`;
    html=ovTable(['פרויקט','מחלקה','דד-ליין','פיגור'], sorted.slice(0,cap).map(p=>[ ovEsc(p.key), ovEsc(p.dept),
      `<span class="mono">${fmtDate(p.deadline)}</span>`, p.delayDays>0?`<span class="ov-red mono">${p.delayDays}י׳</span>`:'<span class="ov-green mono">0</span>' ]));
  } else if (which==='done') {
    const sorted=[...k.last30].sort((a,b)=> ovDayMs(b.maxComp)-ovDayMs(a.maxComp));
    title=`הסתיימו ב-30 הימים האחרונים (${k.last30.length})`;
    html=ovTable(['פרויקט','מחלקה','הושלם'], sorted.slice(0,cap).map(p=>[ ovEsc(p.key), ovEsc(p.dept), `<span class="mono">${fmtDate(p.maxComp)}</span>` ]));
  } else if (which==='nodl') {
    title=`פרויקטים פעילים ללא דדליין (${k.noDL.length})`;
    html=ovTable(['פרויקט','מחלקה','מצב'], k.noDL.slice(0,cap).map(p=>[ ovEsc(p.key), ovEsc(p.dept), p.redFlag?'<span class="ov-red">דגל אדום</span>':'<span class="muted">פעיל</span>' ]));
  } else { return; }
  ovOpenModal(title, html);
}

function syncHubBackground() {
  // Fire-and-forget — kicks off a fresh Monday→Supabase sync without blocking the UI
  fetch(HUB_SYNC_URL, { method: 'GET', headers: { 'Authorization': `Bearer ${ANON_KEY}` } })
    .then(r => r.json())
    .then(j => console.log('hub-sync background result:', j))
    .catch(e => console.warn('hub-sync background error:', e.message));
}

async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  const originalHTML = btn.innerHTML;
  btn.disabled = true;
  btn.classList.add('spinning');
  btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="spinning"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> טוען נתונים…';
  try {
    syncHubBackground();
    const [raw, pipeRaw, plRaw] = await Promise.all([fetchRaw(), fetchPipeline(), fetchProductLaunches()]);
    window.__rawItems    = raw;
    allProjects          = processItems(raw);
    pipelineProjects     = processPipeline(pipeRaw);
    productLaunchItems   = plRaw;
    updateMeta(raw.length);
    buildTeamFilter();
    buildSidebar();
    applyFilters();
  } catch(e) { console.error(e); }
  finally {
    btn.disabled = false;
    btn.classList.remove('spinning');
    btn.innerHTML = originalHTML;
  }
}

function updateMeta(rawCount) {
  const today = new Date().toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'});
  document.getElementById('tbDate').textContent = `נכון ל-${today}`;
}

function buildTeamFilter() {
  const teams = [...new Set(allProjects.map(p=>p.team).filter(Boolean))].sort();
  const sel = document.getElementById('selTeam');
  if (!sel) return;
  sel.innerHTML = `<option value="all">כל הצוותות</option>` +
    teams.map(t => `<option value="${t}">${t}</option>`).join('');
}

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
async function init() {
  try {
    const [raw, pipeRaw, plRaw] = await Promise.all([fetchRaw(), fetchPipeline(), fetchProductLaunches()]);
    window.__rawItems    = raw;
    allProjects          = processItems(raw);
    pipelineProjects     = processPipeline(pipeRaw);
    productLaunchItems   = plRaw;
    updateMeta(raw.length);
    buildTeamFilter();
    buildSidebar();
    applyFilters();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } catch(err) {
    console.error(err);
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center;color:var(--accent)">
        <div style="font-family:'Suez One',serif;font-size:20px">שגיאה בטעינת הנתונים</div>
        <div style="font-size:11px;color:rgba(26,29,35,.55);margin-top:8px">${err.message}</div>
      </div>`;
  }
}

init();
</script>
