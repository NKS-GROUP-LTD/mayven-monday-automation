// PIPELINE RENDER
// ══════════════════════════════════════════════════

// Pipeline filter state (persists across re-renders)
const pipeF = { groupBy: 'stage', sort: 'stage', hideDone: true, dept: 'all', stageFilter: null };

function stageColor(s) {
  const m = {
    'Backlog':               '#94a3b8',
    'Discovery & Planning':  '#3b82f6',
    'Technical Specs':       '#6366f1',
    'UI/UX Design':          '#a855f7',
    'In Development':        '#D05A72',
    'QA & Testing':          '#7c3aed',
    'Launch Prep':           '#d97706',
    'Deployed':              '#15803d',
    'Go Live':               '#059669',
    'On Hold':               '#64748b',
    'Red Flag 🚩':           '#b91c1c',
    'Cancelled':             '#9ca3af',
    'NTH':                   '#9ca3af',
  };
  return m[s] || '#64748b';
}

function renderPipeline(ps) {

  // ── Battery bar ──
  function batteryHtml(p) {
    const hub = p.hub;
    if (!hub || hub.total === 0) {
      return `<div class="no-hub-msg">אין נתוני משימות מקושרות מהאב</div>`;
    }
    const arr   = hub.statusArr || [];
    const total = hub.total;
    const cnt   = (s) => arr.filter(x => x === s).length;
    const nDone    = cnt('הסתיימה');
    const nCancel  = cnt('מבוטלת');
    const nBlocked = cnt('דגל אדום');
    const nActive  = cnt('בעבודה') + cnt('מאושר');
    const nWait    = cnt('ממתין');
    const nBacklog = cnt('בנק משימות');
    const pct  = (n) => total ? Math.round(n / total * 100) : 0;
    const done = nDone + nCancel;

    const tlStr = hub.tlStart && hub.tlEnd
      ? `<div class="pcard-row"><span class="pcard-row-icon">📅</span><span class="pcard-row-label">טיימליין:</span><span class="pcard-row-val ltr">${fmtDate(hub.tlStart)} → ${fmtDate(hub.tlEnd)}</span></div>`
      : '';
    const effortStr = hub.effortA
      ? `<div class="pcard-row"><span class="pcard-row-icon">⏱</span><span class="pcard-row-label">שעות בפועל:</span><span class="pcard-row-val">${fmtN(hub.effortA)}</span>${hub.effortP ? `<span style="font-size:11px;color:rgba(26,29,35,.42)">/ ${fmtN(hub.effortP)} מתוכנן</span>` : ''}</div>`
      : '';

    return `<div class="battery-wrap">
        <div class="battery-header">
          <span class="battery-title">📋 התקדמות משימות</span>
          <span class="battery-pct">${done}/${total} · ${pct(done)}%</span>
        </div>
        <div class="battery-bar">
          ${nDone    ? `<div class="battery-seg" style="width:${pct(nDone)}%;background:#16a34a" title="הסתיימו ${nDone}"></div>` : ''}
          ${nActive  ? `<div class="battery-seg" style="width:${pct(nActive)}%;background:#D05A72" title="בעבודה ${nActive}"></div>` : ''}
          ${nWait    ? `<div class="battery-seg" style="width:${pct(nWait)}%;background:#d97706" title="ממתין ${nWait}"></div>` : ''}
          ${nBlocked ? `<div class="battery-seg" style="width:${pct(nBlocked)}%;background:#b91c1c" title="חסום ${nBlocked}"></div>` : ''}
          ${nCancel  ? `<div class="battery-seg" style="width:${pct(nCancel)}%;background:#cbd5e1" title="בוטל ${nCancel}"></div>` : ''}
          ${nBacklog ? `<div class="battery-seg" style="width:${pct(nBacklog)}%;background:#e2e8f0" title="בק לוג ${nBacklog}"></div>` : ''}
        </div>
        <div class="battery-legend">
          ${nDone    ? `<div class="bat-leg"><div class="bat-dot" style="background:#16a34a"></div>${nDone} הסתיימו</div>` : ''}
          ${nActive  ? `<div class="bat-leg"><div class="bat-dot" style="background:#D05A72"></div>${nActive} בעבודה</div>` : ''}
          ${nWait    ? `<div class="bat-leg"><div class="bat-dot" style="background:#d97706"></div>${nWait} ממתין</div>` : ''}
          ${nBlocked ? `<div class="bat-leg"><div class="bat-dot" style="background:#b91c1c"></div>${nBlocked} חסום</div>` : ''}
          ${nCancel  ? `<div class="bat-leg"><div class="bat-dot" style="background:#cbd5e1"></div>${nCancel} בוטל</div>` : ''}
        </div>
      </div>
      ${tlStr}${effortStr}`;
  }

  // ── Single card ──
  function cardHtml(p) {
    const sc = stageColor(p.devStage);
    const h  = p.health;

    // Deadline display
    const deadlineHtml = p.deadline ? (() => {
      const diffDays = Math.round((p.deadline.getTime() - new Date().setHours(0,0,0,0)) / 864e5);
      const relColor = diffDays < 0  ? 'var(--red-fg)'
                     : diffDays <= 7 ? 'var(--yellow-fg)'
                     :                 'rgba(26,29,35,.45)';
      const relTxt   = diffDays < 0  ? `${Math.abs(diffDays)} ימי איחור`
                     : diffDays === 0 ? 'היום!'
                     :                 `${diffDays} ימים`;
      return `<span class="pcard-row-val ltr">${fmtDate(p.deadline)}</span>
              <span class="pcard-row-rel" style="color:${relColor}">(${relTxt})</span>`;
    })() : `<span style="color:rgba(26,29,35,.38)">ללא דד-ליין</span>`;

    const impactColor = p.bizImpact === 'גבוה' ? '#b91c1c' : p.bizImpact === 'בינוני' ? '#d97706' : '#94a3b8';
    const impactHtml  = p.bizImpact
      ? `<span style="font-size:10.5px;font-weight:700;color:${impactColor};display:flex;align-items:center;gap:3px"><span style="font-size:9px">⬤</span>${p.bizImpact}</span>`
      : '';

    const spHtml = (p.spAct || p.spPlan)
      ? `<span style="font-size:11.5px;color:rgba(26,29,35,.55)">SP: <strong style="color:var(--ink);font-family:'JetBrains Mono',monospace">${p.spAct||0}</strong><span style="opacity:.5">/${p.spPlan||0}</span></span>`
      : '';

    const briefHtml = p.briefUrl
      ? `<a href="${p.briefUrl}" target="_blank" style="font-size:11.5px;color:var(--blue-fg);text-decoration:none;font-weight:600;display:flex;align-items:center;gap:3px">📎 בריף</a>`
      : '';

    return `<div class="pcard" data-hlth="${h}">
      <div class="pcard-stripe" data-hlth="${h}"></div>
      <div class="pcard-head">
        <div class="pcard-stage-row">
          <span class="pcard-stage" style="background:${sc}">${p.devStage||'—'}</span>
          ${healthHtml(h)}
        </div>
        <div class="pcard-name">${stripE(p.name)||p.name||'—'}</div>
        <div class="pcard-people">
          ${p.owner    ? `<div class="pcard-person"><span class="pcard-person-role">Owner</span> ${p.owner}</div>` : ''}
          ${p.pm       ? `<div class="pcard-person"><span class="pcard-person-role">PM</span> ${p.pm}</div>` : ''}
          ${p.department ? `<div class="pcard-person"><span class="pcard-person-role">מחלקה</span> ${p.department}</div>` : ''}
          ${p.quarter  ? `<div class="pcard-person"><span class="pcard-person-role">רבעון</span> ${p.quarter}</div>` : ''}
        </div>
      </div>

      <div class="pcard-body">
        ${batteryHtml(p)}
        <div class="pcard-row">
          <span class="pcard-row-icon">🎯</span>
          <span class="pcard-row-label">דד-ליין:</span>
          ${deadlineHtml}
        </div>
      </div>

      <div class="pcard-foot">
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
          ${spHtml}
          ${impactHtml}
        </div>
        ${briefHtml}
      </div>
    </div>`;
  }

  // ── KPI ──
  const active      = ps.filter(p => !PIPELINE_DONE_STAGES.has(p.devStage) && !PIPELINE_CANCEL_STAGES.has(p.devStage) && p.devStage !== 'On Hold' && p.devStage !== 'NTH' && p.devStage !== 'Backlog');
  const inDev       = ps.filter(p => p.devStage === 'In Development').length;
  const inQA        = ps.filter(p => p.devStage === 'QA & Testing').length;
  const done        = ps.filter(p => PIPELINE_DONE_STAGES.has(p.devStage)).length;
  const late        = ps.filter(p => p.health === 'red').length;
  const noDeadline  = ps.filter(p => p.health === 'no-deadline' && !PIPELINE_DONE_STAGES.has(p.devStage) && !PIPELINE_CANCEL_STAGES.has(p.devStage)).length;
  const spPlanTotal = ps.reduce((s,p) => s + p.spPlan, 0);
  const spActTotal  = ps.reduce((s,p) => s + p.spAct, 0);

  // ── Department options ──
  const depts = ['all', ...new Set(ps.map(p=>p.department).filter(Boolean)).values()].sort((a,b)=> a==='all'?-1:a.localeCompare(b));

  // ── Filter ──
  let filtered = ps;
  // Stage filter tile takes priority; hideDone only applies when no stage tile is active
  if      (pipeF.stageFilter === '__late__')  filtered = filtered.filter(p => p.health === 'red');
  else if (pipeF.stageFilter === '__nodl__')  filtered = filtered.filter(p => p.health === 'no-deadline' && !PIPELINE_DONE_STAGES.has(p.devStage) && !PIPELINE_CANCEL_STAGES.has(p.devStage));
  else if (pipeF.stageFilter)                filtered = filtered.filter(p => p.devStage === pipeF.stageFilter);
  if (pipeF.hideDone && !pipeF.stageFilter)  filtered = filtered.filter(p => !PIPELINE_DONE_STAGES.has(p.devStage) && !PIPELINE_CANCEL_STAGES.has(p.devStage));
  if (pipeF.dept !== 'all') filtered = filtered.filter(p => p.department === pipeF.dept);
  if (filterSearch) filtered = filtered.filter(p => (p.name||'').toLowerCase().includes(filterSearch));

  // ── Sort ──
  const healthOrder = { red:0, 'no-deadline':1, yellow:2, green:3, done:4, cancel:5 };
  const SORT_FNS = {
    stage:    (a,b) => PIPELINE_STAGE_ORDER.indexOf(a.devStage) - PIPELINE_STAGE_ORDER.indexOf(b.devStage),
    deadline: (a,b) => (!a.deadline&&!b.deadline)?0:(!a.deadline?1:(!b.deadline?-1:a.deadline-b.deadline)),
    health:   (a,b) => (healthOrder[a.health]??9) - (healthOrder[b.health]??9),
  };
  filtered = filtered.slice().sort(SORT_FNS[pipeF.sort] || SORT_FNS.stage);

  // ── Group ──
  function groupCards(arr) {
    if (pipeF.groupBy === 'none') return `<div class="pc-grid">${arr.map(cardHtml).join('')}</div>`;
    if (pipeF.groupBy === 'quarter') {
      const groups = {};
      arr.forEach(p => { const q=p.quarter||'ללא רבעון'; (groups[q]=groups[q]||[]).push(p); });
      return Object.entries(groups).sort(([a],[b])=>a.localeCompare(b)).map(([q,items]) => {
        const lateN = items.filter(p=>p.health==='red').length;
        return `<div class="pgroup">
          <div class="pgroup-head">
            <span class="pgroup-label">📅 ${q}</span>
            <span class="pgroup-count">${items.length} אפיקים</span>
            ${lateN ? `<span class="pgroup-late">⚠ ${lateN} באיחור</span>` : ''}
          </div>
          <div class="pc-grid">${items.map(cardHtml).join('')}</div>
        </div>`;
      }).join('');
    }
    // Default: stage grouping in logical dev order
    const stageGroups = {};
    arr.forEach(p => { const s=p.devStage||'—'; (stageGroups[s]=stageGroups[s]||[]).push(p); });
    const orderedKeys = PIPELINE_STAGE_ORDER.filter(s=>stageGroups[s])
      .concat(Object.keys(stageGroups).filter(s=>!PIPELINE_STAGE_ORDER.includes(s)));
    return orderedKeys.map(s => {
      const items = stageGroups[s]||[];
      const sc    = stageColor(s);
      const lateN = items.filter(p=>p.health==='red').length;
      return `<div class="pgroup">
        <div class="pgroup-head">
          <span class="pgroup-stage-pill" style="background:${sc}">${s}</span>
          <span class="pgroup-count">${items.length} אפיקים</span>
          ${lateN ? `<span class="pgroup-late">⚠ ${lateN} באיחור</span>` : ''}
        </div>
        <div class="pc-grid">${items.map(cardHtml).join('')}</div>
      </div>`;
    }).join('');
  }

  // ── Stage tile data ──
  const stageTiles = PIPELINE_STAGE_ORDER.map(s => {
    const items = ps.filter(p => p.devStage === s);
    if (!items.length) return null;
    return { stage: s, count: items.length, sp: items.reduce((a,p)=>a+p.spAct,0) };
  }).filter(Boolean);
  const lateItems = ps.filter(p => p.health === 'red');
  const noDlItems = ps.filter(p => p.health === 'no-deadline' && !PIPELINE_DONE_STAGES.has(p.devStage) && !PIPELINE_CANCEL_STAGES.has(p.devStage));

  document.getElementById('content').innerHTML = `
  <div class="page">
    <div class="page-head">
      <div>
        <h1 class="page-title">⚙️ פורטפוליו טכנולוגיה</h1>
        <div class="page-sub">Dev Project Pipeline · ${ps.length} אפיקים סה״כ · ${active.length} פעילים · ${late} באיחור</div>
      </div>
    </div>

    <!-- Stage tile strip — clickable filter -->
    <div class="pipe-tile-strip">

      <div class="pipe-tile ${!pipeF.stageFilter?'pt-active':''}"
           onclick="pipeF.stageFilter=null;renderPipeline(pipelineProjects)">
        <div class="pt-badge" style="background:rgba(26,29,35,.55)">הכל</div>
        <div class="pt-count">${ps.length}</div>
        <div class="pt-sp">SP ${spActTotal}</div>
      </div>

      ${stageTiles.map(t => `
      <div class="pipe-tile ${pipeF.stageFilter===t.stage?'pt-active':''}"
           onclick="pipeF.stageFilter=pipeF.stageFilter==='${t.stage}'?null:'${t.stage}';renderPipeline(pipelineProjects)">
        <div class="pt-badge" style="background:${stageColor(t.stage)}">${t.stage}</div>
        <div class="pt-count">${t.count}</div>
        <div class="pt-sp">SP ${t.sp||0}</div>
      </div>`).join('')}

      ${lateItems.length ? `
      <div class="pipe-tile pt-late ${pipeF.stageFilter==='__late__'?'pt-active':''}"
           onclick="pipeF.stageFilter=pipeF.stageFilter==='__late__'?null:'__late__';renderPipeline(pipelineProjects)">
        <div class="pt-badge" style="background:#b91c1c">⚠ באיחור</div>
        <div class="pt-count">${lateItems.length}</div>
        <div class="pt-sp">SP ${lateItems.reduce((a,p)=>a+p.spAct,0)}</div>
      </div>` : ''}

      ${noDlItems.length ? `
      <div class="pipe-tile pt-nodl ${pipeF.stageFilter==='__nodl__'?'pt-active':''}"
           onclick="pipeF.stageFilter=pipeF.stageFilter==='__nodl__'?null:'__nodl__';renderPipeline(pipelineProjects)">
        <div class="pt-badge" style="background:#d97706">ללא דד-ליין</div>
        <div class="pt-count">${noDlItems.length}</div>
        <div class="pt-sp">—</div>
      </div>` : ''}

    </div>

    <!-- Filter bar -->
    <div class="pf-bar">
      <span class="pf-label">קיבוץ:</span>
      <select class="pf-select" onchange="pipeF.groupBy=this.value;renderPipeline(pipelineProjects)">
        <option value="stage"   ${pipeF.groupBy==='stage'  ?'selected':''}>שלב פיתוח</option>
        <option value="quarter" ${pipeF.groupBy==='quarter'?'selected':''}>רבעון</option>
        <option value="none"    ${pipeF.groupBy==='none'   ?'selected':''}>ללא קיבוץ</option>
      </select>
      <div class="pf-div"></div>
      <span class="pf-label">מיון:</span>
      <select class="pf-select" onchange="pipeF.sort=this.value;renderPipeline(pipelineProjects)">
        <option value="stage"    ${pipeF.sort==='stage'   ?'selected':''}>שלב פיתוח</option>
        <option value="deadline" ${pipeF.sort==='deadline'?'selected':''}>דד-ליין</option>
        <option value="health"   ${pipeF.sort==='health'  ?'selected':''}>בריאות</option>
      </select>
      <div class="pf-div"></div>
      <span class="pf-label">מחלקה:</span>
      <select class="pf-select" onchange="pipeF.dept=this.value;renderPipeline(pipelineProjects)">
        ${depts.map(d=>`<option value="${d}" ${pipeF.dept===d?'selected':''}>${d==='all'?'כולן':d}</option>`).join('')}
      </select>
      <div class="pf-div"></div>
      <button class="pf-toggle ${pipeF.hideDone?'on':''}"
        onclick="pipeF.hideDone=!pipeF.hideDone;renderPipeline(pipelineProjects)">
        ${pipeF.hideDone ? '👁 הצג הושלמו/בוטלו' : '🙈 הסתר הושלמו/בוטלו'}
      </button>
      <span style="margin-right:auto;font-size:11px;color:rgba(26,29,35,.42)">${filtered.length} / ${ps.length} מוצגים</span>
    </div>

    <!-- Cards -->
    ${filtered.length === 0
      ? `<div class="ms-card"><div class="ms-card-body"><div class="empty"><div class="empty-icon">🔍</div><div>לא נמצאו אפיקים</div></div></div></div>`
      : groupCards(filtered)
    }
  </div>`;
}

// ══════════════════════════════════════════════════
// REFRESH
// ══════════════════════════════════════════════════
function syncHubBackground() {
  // Fire-and-forget — kicks off a fresh Monday→Supabase sync without blocking the UI
  fetch(HUB_SYNC_URL, { method: 'GET', headers: { 'Authorization': `Bearer ${ANON_KEY}` } })
    .then(r => r.json())
    .then(j => console.log('hub-sync background result:', j))
    .catch(e => console.warn('hub-sync background error:', e.message));
}

async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  const originalHTML = btn.innerHTML;
  btn.disabled = true;
  btn.classList.add('spinning');
  btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="spinning"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> טוען נתונים…';
  try {
    // Kick off background sync with Monday (doesn't block dashboard load)
    syncHubBackground();
    const [raw, pipeRaw] = await Promise.all([fetchRaw(), fetchPipeline()]);
    window.__rawItems    = raw;
    allProjects          = processItems(raw);
    pipelineProjects     = processPipeline(pipeRaw);
    updateMeta(raw.length);
    buildTeamFilter();
    buildSidebar();
    applyFilters();
  } catch(e) { console.error(e); }
  finally {
    btn.disabled = false;
    btn.classList.remove('spinning');
    btn.innerHTML = originalHTML;
  }
}

function updateMeta(rawCount) {
  const today = new Date().toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'});
  document.getElementById('tbDate').textContent = `נכון ל-${today}`;
}

function buildTeamFilter() {
  const teams = [...new Set(allProjects.map(p=>p.team).filter(Boolean))].sort();
  const sel = document.getElementById('selTeam');
  if (!sel) return;
  sel.innerHTML = `<option value="all">כל הצוותות</option>` +
    teams.map(t => `<option value="${t}">${t}</option>`).join('');
}

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
async function init() {
  try {
    const [raw, pipeRaw] = await Promise.all([fetchRaw(), fetchPipeline()]);
    window.__rawItems    = raw;
    allProjects          = processItems(raw);
    pipelineProjects     = processPipeline(pipeRaw);
    updateMeta(raw.length);
    buildTeamFilter();
    buildSidebar();
    applyFilters();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } catch(err) {
    console.error(err);
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center;color:var(--accent)">
        <div style="font-family:'Suez One',serif;font-size:20px">שגיאה בטעינת הנתונים</div>
        <div style="font-size:11px;color:rgba(26,29,35,.55);margin-top:8px">${err.message}</div>
      </div>`;
  }
}

init();
</script>
</body>
</html>
