<style>
:root{--bg:#0a0a0f;--s:#111118;--s2:#1a1a24;--b:#2a2a3a;--a:#c8a96e;--a2:#7c6fff;--g:#3ecf8e;--r:#ff4d6d;--y:#ffd166;--t:#e8e8f0;--m:#6b6b85}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;direction:rtl}
header{padding:22px 36px 18px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'DM Serif Display',serif;font-size:24px;color:var(--a)}
.logo span{color:var(--m);font-size:12px;font-family:'Heebo';font-weight:300;display:block;margin-top:1px}
.hmeta{font-family:'DM Mono',monospace;font-size:11px;color:var(--m);background:var(--s2);padding:5px 12px;border-radius:20px;border:1px solid var(--b)}
.kbar{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--b);border-bottom:1px solid var(--b)}
.kpi{background:var(--s);padding:16px 18px;text-align:center}
.kv{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;color:var(--t);line-height:1;margin-bottom:4px}
.kl{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:1px}
.kpi.gold .kv{color:var(--a)}.kpi.green .kv{color:var(--g)}.kpi.red .kv{color:var(--r)}.kpi.purple .kv{color:var(--a2)}
.main{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 145px)}
.sidebar{background:var(--s);border-left:1px solid var(--b);padding:16px;overflow-y:auto}
.stitle{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--m);margin-bottom:8px;margin-top:4px}
.sbox{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:7px;padding:8px 11px;color:var(--t);font-family:'Heebo';font-size:13px;margin-bottom:14px;direction:rtl}
.sbox:focus{outline:none;border-color:var(--a2)}
.sbox::placeholder{color:var(--m)}
.vtoggle{display:flex;gap:2px;background:var(--s2);padding:3px;border-radius:7px;margin-bottom:14px}
.vbtn{flex:1;background:transparent;border:none;color:var(--m);padding:5px;border-radius:4px;font-size:12px;cursor:pointer;font-family:'Heebo';transition:all .15s}
.vbtn.active{background:var(--s);color:var(--t)}
.fg{margin-bottom:12px}
.fb{display:block;width:100%;background:transparent;border:1px solid transparent;color:var(--m);padding:4px 9px;border-radius:5px;font-family:'Heebo';font-size:12px;text-align:right;cursor:pointer;transition:all .15s;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fb:hover{background:var(--s2);color:var(--t)}
.fb.active{background:var(--a2);color:#fff}
.content{padding:24px 32px;overflow-y:auto}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.pc{background:var(--s);border:1px solid var(--b);border-radius:11px;padding:16px;transition:all .2s;animation:fu .2s ease both}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.pc:hover{border-color:var(--a2);transform:translateY(-2px);box-shadow:0 5px 20px rgba(124,111,255,.1)}
.ct{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--a2);margin-bottom:4px;font-family:'DM Mono';overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cn{font-size:13px;font-weight:700;color:var(--t);margin-bottom:10px;line-height:1.3}
.cs{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.si{background:var(--s2);border-radius:6px;padding:7px 9px}
.sv{font-family:'DM Mono';font-size:17px;font-weight:500;color:var(--t);line-height:1}
.sl{font-size:9px;color:var(--m);margin-top:2px;text-transform:uppercase}
.cf{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--m)}
.sb{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.sb.ok{background:rgba(62,207,142,.15);color:var(--g)}
.sb.late{background:rgba(255,77,109,.15);color:var(--r)}
.sb.nodl{background:rgba(107,107,133,.1);color:var(--m)}
.pt{width:100%;border-collapse:collapse;font-size:12px}
.pt th{text-align:right;padding:9px 13px;border-bottom:1px solid var(--b);color:var(--m);font-size:9px;text-transform:uppercase;letter-spacing:1px;font-weight:400;white-space:nowrap}
.pt td{padding:10px 13px;border-bottom:1px solid rgba(42,42,58,.4);vertical-align:middle}
.pt tr:hover td{background:var(--s2)}
.tn{font-weight:600;color:var(--t);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.es{display:flex;align-items:center;justify-content:center;flex-direction:column;min-height:300px;gap:12px;color:var(--m)}
</style>
